<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matchup Lab — Analisi di corsia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   MATCHUP LAB — design system
   Palette:
     bg-void / bg-panel / bg-panel-raised  -> grafite scuro, tre profondita'
     ink / ink-dim / ink-faint             -> testo, tre pesi
     champ-a  (teal)  -> sempre e solo il campione nello slot sinistro
     champ-b  (ambra) -> sempre e solo il campione nello slot destro
     warn (ember)     -> riservato ai soli avvisi di campione ridotto
     dmg-phys/magic/true -> usati SOLO nel grafico di composizione danno
   ============================================================ */
:root{
  --bg-void:#0A0D0F;
  --bg-panel:#12171A;
  --bg-panel-raised:#1A2124;
  --bg-panel-hover:#212B30;
  --line:#242E33;
  --line-soft:#1A2226;
  --ink:#EAF2F3;
  --ink-dim:#8FA3A9;
  --ink-faint:#54666C;

  --champ-a:#3FD8C7;
  --champ-a-soft:rgba(63,216,199,.13);
  --champ-a-line:rgba(63,216,199,.4);

  --champ-b:#F3A83D;
  --champ-b-soft:rgba(243,168,61,.13);
  --champ-b-line:rgba(243,168,61,.4);

  --warn:#E2574C;
  --warn-soft:rgba(226,87,76,.14);
  --mid:#E9C34C;
  --mid-soft:rgba(233,195,76,.14);

  --dmg-phys:#C79A52;
  --dmg-magic:#7C93E8;
  --dmg-true:#D9808A;

  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:18px;

  --font-display:'Rajdhani',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;

  --shadow-card:0 1px 0 rgba(255,255,255,.03) inset, 0 10px 28px -16px rgba(0,0,0,.7);
  --ease:cubic-bezier(.22,.61,.36,1);
}

*,*::before,*::after{box-sizing:border-box;}
html{background:var(--bg-void);}
body{
  margin:0;
  background:
    radial-gradient(1200px 600px at 15% -10%, rgba(63,216,199,.05), transparent 60%),
    radial-gradient(1200px 600px at 85% 0%, rgba(243,168,61,.045), transparent 60%),
    var(--bg-void);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;}
}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:700;margin:0;letter-spacing:.01em;}
p{margin:0;}
button{font-family:inherit;color:inherit;}
::selection{background:var(--champ-a-soft);}
a{color:var(--champ-a);}

.mono{font-family:var(--font-mono);}
.visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;}

/* ---------------- layout shell ---------------- */
.shell{max-width:1240px;margin:0 auto;padding:0 24px 80px;}

/* ---------------- top bar ---------------- */
.topbar{
  position:sticky;top:0;z-index:40;
  background:rgba(10,13,15,.86);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.topbar-inner{
  max-width:1240px;margin:0 auto;padding:16px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;
}
.brand{display:flex;align-items:baseline;gap:10px;}
.brand-mark{
  font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:.06em;
  color:var(--ink);
}
.brand-mark em{
  font-style:normal;color:var(--champ-a);
  text-shadow:0 0 18px var(--champ-a-line);
}
.brand-tag{font-size:12px;color:var(--ink-faint);font-family:var(--font-mono);letter-spacing:.02em;}

.role-pills{display:flex;gap:6px;flex-wrap:wrap;}
.role-pill{
  appearance:none;border:1px solid var(--line);background:var(--bg-panel);
  color:var(--ink-dim);padding:8px 16px;border-radius:999px;cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:13.5px;letter-spacing:.05em;text-transform:uppercase;
  transition:border-color .15s var(--ease), color .15s var(--ease), background .15s var(--ease);
}
.role-pill:hover{border-color:var(--ink-faint);color:var(--ink);}
.role-pill:focus-visible{outline:2px solid var(--champ-a);outline-offset:2px;}
.role-pill.active{
  background:linear-gradient(180deg, rgba(63,216,199,.16), rgba(63,216,199,.05));
  border-color:var(--champ-a-line);color:var(--ink);
}

/* ---------------- picker console ---------------- */
.picker{padding:36px 0 20px;}
.picker-head{margin-bottom:18px;}
.picker-head h2{font-size:15px;color:var(--ink-dim);font-weight:600;text-transform:uppercase;letter-spacing:.1em;}
.picker-console{
  display:grid;grid-template-columns:1fr auto 1fr;gap:18px;align-items:stretch;
}
.slot{
  position:relative;
  background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius-lg);
  padding:18px 20px;box-shadow:var(--shadow-card);
  border-top:2px solid transparent;
}
.slot.slot-a{border-top-color:var(--champ-a);}
.slot.slot-b{border-top-color:var(--champ-b);}
.slot-label{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.slot-a .slot-label{color:var(--champ-a);}
.slot-b .slot-label{color:var(--champ-b);}
.slot-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

.combobox{position:relative;}
.combobox input{
  width:100%;background:var(--bg-void);border:1px solid var(--line);border-radius:var(--radius-md);
  color:var(--ink);font-family:var(--font-display);font-weight:600;font-size:19px;letter-spacing:.01em;
  padding:10px 14px;outline:none;transition:border-color .15s var(--ease);
}
.combobox input::placeholder{color:var(--ink-faint);font-weight:500;}
.combobox input:focus{border-color:var(--ink-faint);}
.slot-a .combobox input:focus{border-color:var(--champ-a-line);}
.slot-b .combobox input:focus{border-color:var(--champ-b-line);}
.combobox input:disabled{opacity:.4;cursor:not-allowed;}
.combobox-list{
  position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:30;
  background:var(--bg-panel-raised);border:1px solid var(--line);border-radius:var(--radius-md);
  max-height:280px;overflow-y:auto;box-shadow:0 20px 40px -12px rgba(0,0,0,.8);
  display:none;
}
.combobox-list.open{display:block;}
.combobox-option{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:9px 14px;cursor:pointer;font-size:14.5px;color:var(--ink-dim);
  border-bottom:1px solid var(--line-soft);
}
.combobox-option:last-child{border-bottom:none;}
.combobox-option:hover,.combobox-option.active{background:var(--bg-panel-hover);color:var(--ink);}
.combobox-option .n{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-faint);}
.combobox-option.low .n{color:var(--warn);}
.combobox-empty{padding:14px;color:var(--ink-faint);font-size:13px;}

.slot-hint{margin-top:10px;font-size:12.5px;color:var(--ink-faint);min-height:16px;}

.vs-divider{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  width:64px;
}
.vs-mark{
  font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:.08em;
  color:var(--ink-faint);
}
.swap-btn{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--bg-panel);
  color:var(--ink-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .2s var(--ease), border-color .15s var(--ease), color .15s var(--ease);
}
.swap-btn:hover{border-color:var(--ink-faint);color:var(--ink);}
.swap-btn:active{transform:rotate(180deg);}
.swap-btn:focus-visible{outline:2px solid var(--champ-a);outline-offset:2px;}

/* quick chips */
.chips-row{margin-top:18px;}
.chips-label{font-size:11.5px;font-family:var(--font-mono);letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px;}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{
  appearance:none;border:1px solid var(--line);background:var(--bg-panel);color:var(--ink-dim);
  padding:7px 13px;border-radius:999px;font-size:13px;cursor:pointer;font-family:var(--font-body);
  display:flex;align-items:center;gap:7px;transition:border-color .15s var(--ease), color .15s var(--ease);
}
.chip:hover{border-color:var(--ink-faint);color:var(--ink);}
.chip .n{font-family:var(--font-mono);color:var(--ink-faint);font-size:11.5px;}

/* ---------------- empty state ---------------- */
.empty-state{
  margin-top:8px;padding:60px 30px;text-align:center;border:1px dashed var(--line);border-radius:var(--radius-lg);
  color:var(--ink-dim);
}
.empty-state h3{font-size:20px;color:var(--ink);margin-bottom:8px;}
.empty-state p{max-width:520px;margin:0 auto;color:var(--ink-dim);font-size:14px;}
.empty-state .suggestions{margin-top:20px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}

/* ---------------- verdict band ---------------- */
.dossier{margin-top:28px;}
.verdict-band{
  background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius-lg);
  padding:28px 30px;box-shadow:var(--shadow-card);
}
.verdict-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:22px;}
.matchup-title{font-family:var(--font-display);font-weight:700;font-size:34px;letter-spacing:.01em;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.matchup-title .name-a{color:var(--champ-a);}
.matchup-title .name-b{color:var(--champ-b);}
.matchup-title .vs-x{color:var(--ink-faint);font-size:20px;}
.role-tag{font-family:var(--font-mono);font-size:12.5px;color:var(--ink-dim);letter-spacing:.03em;margin-top:4px;}

.sample-badge{
  display:inline-flex;align-items:center;gap:8px;padding:7px 14px;border-radius:999px;
  font-size:12.5px;font-family:var(--font-mono);letter-spacing:.02em;border:1px solid var(--line);white-space:nowrap;
}
.sample-badge .dot{width:8px;height:8px;border-radius:50%;}
.sample-badge.high{color:var(--champ-a);border-color:var(--champ-a-line);background:var(--champ-a-soft);}
.sample-badge.high .dot{background:var(--champ-a);}
.sample-badge.mid{color:var(--mid);border-color:rgba(233,195,76,.4);background:var(--mid-soft);}
.sample-badge.mid .dot{background:var(--mid);}
.sample-badge.low{color:var(--warn);border-color:rgba(226,87,76,.4);background:var(--warn-soft);}
.sample-badge.low .dot{background:var(--warn);}

.winrate-bar{position:relative;height:46px;border-radius:999px;overflow:hidden;background:var(--bg-void);border:1px solid var(--line);margin-bottom:16px;}
.winrate-bar .fill-a,.winrate-bar .fill-b{position:absolute;top:0;bottom:0;display:flex;align-items:center;font-family:var(--font-display);font-weight:700;font-size:16px;}
.winrate-bar .fill-a{left:0;background:linear-gradient(90deg, rgba(63,216,199,.22), rgba(63,216,199,.42));color:var(--champ-a);justify-content:flex-start;padding-left:18px;}
.winrate-bar .fill-b{right:0;background:linear-gradient(270deg, rgba(243,168,61,.22), rgba(243,168,61,.42));color:var(--champ-b);justify-content:flex-end;padding-right:18px;}
.winrate-bar .tick50{position:absolute;left:50%;top:-1px;bottom:-1px;width:1px;background:var(--ink-faint);opacity:.6;}

.verdict-foot{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.verdict-col{padding:14px 16px;border-radius:var(--radius-md);background:var(--bg-panel-raised);border:1px solid var(--line-soft);}
.verdict-col.a{border-left:2px solid var(--champ-a);}
.verdict-col.b{border-left:2px solid var(--champ-b);}
.verdict-col .champ-name{font-family:var(--font-display);font-weight:700;font-size:15px;margin-bottom:6px;}
.verdict-col.a .champ-name{color:var(--champ-a);}
.verdict-col.b .champ-name{color:var(--champ-b);}
.verdict-col .row{display:flex;justify-content:space-between;font-size:13px;color:var(--ink-dim);padding:3px 0;}
.verdict-col .row .v{font-family:var(--font-mono);color:var(--ink);}
.verdict-sentence{margin-top:18px;padding-top:16px;border-top:1px solid var(--line-soft);font-size:14.5px;color:var(--ink);line-height:1.6;}
.verdict-sentence strong{font-weight:700;}

/* ---------------- tabs ---------------- */
.tabs{display:flex;gap:4px;margin-top:22px;border-bottom:1px solid var(--line);overflow-x:auto;}
.tab-btn{
  appearance:none;background:transparent;border:none;border-bottom:2px solid transparent;
  color:var(--ink-faint);padding:13px 18px;font-family:var(--font-display);font-weight:600;font-size:14px;
  letter-spacing:.03em;text-transform:uppercase;cursor:pointer;white-space:nowrap;
  transition:color .15s var(--ease), border-color .15s var(--ease);
}
.tab-btn:hover{color:var(--ink-dim);}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--champ-a);}
.tab-btn:focus-visible{outline:2px solid var(--champ-a);outline-offset:-2px;}

.tab-panel{display:none;padding:26px 2px 10px;animation:fadeUp .3s var(--ease);}
.tab-panel.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ---------------- generic panel bits ---------------- */
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.card{background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius-lg);padding:22px 24px;box-shadow:var(--shadow-card);}
.card-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
.card-head h3{font-size:16px;}
.card-sub{font-size:12.5px;color:var(--ink-faint);}
.full-span{grid-column:1 / -1;}

.info-icon{
  display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;
  border:1px solid var(--ink-faint);color:var(--ink-faint);font-size:10px;font-family:var(--font-mono);
  cursor:help;flex:none;
}
.info-icon:hover,.info-icon:focus-visible{border-color:var(--ink);color:var(--ink);}

.empty-note{color:var(--ink-faint);font-size:13.5px;padding:20px 4px;line-height:1.6;}

/* percentile chip (overview) */
.pct-row{margin-bottom:16px;}
.pct-row:last-child{margin-bottom:0;}
.pct-row-head{display:flex;justify-content:space-between;font-size:13px;color:var(--ink-dim);margin-bottom:6px;}
.pct-row-head .stat-label{display:flex;align-items:center;gap:6px;}
.pct-track{position:relative;height:8px;border-radius:999px;background:var(--line-soft);}
.pct-marker{
  position:absolute;top:50%;width:12px;height:12px;border-radius:50%;transform:translate(-50%,-50%);
  border:2px solid var(--bg-panel);
}
.pct-marker.a{background:var(--champ-a);}
.pct-marker.b{background:var(--champ-b);}
.pct-vals{display:flex;justify-content:space-between;margin-top:6px;font-family:var(--font-mono);font-size:11.5px;color:var(--ink-faint);}
.pct-vals .va{color:var(--champ-a);}
.pct-vals .vb{color:var(--champ-b);}

/* compare bar */
.compare-bar{margin-bottom:18px;}
.compare-bar:last-child{margin-bottom:0;}
.compare-bar-label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-dim);margin-bottom:8px;}
.compare-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.compare-bar-row .name{width:104px;flex:none;font-size:11px;font-family:var(--font-mono);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.compare-bar-row.a .name{color:var(--champ-a);}
.compare-bar-row.b .name{color:var(--champ-b);}
.compare-track{flex:1;height:14px;background:var(--line-soft);border-radius:4px;position:relative;overflow:hidden;}
.compare-fill{height:100%;border-radius:4px;transition:width .5s var(--ease);}
.compare-fill.a{background:linear-gradient(90deg, rgba(63,216,199,.55), var(--champ-a));}
.compare-fill.b{background:linear-gradient(90deg, rgba(243,168,61,.55), var(--champ-b));}
.compare-bar-row .value{width:78px;flex:none;font-family:var(--font-mono);font-size:12.5px;color:var(--ink);text-align:right;}
.compare-bench{position:absolute;top:-3px;bottom:-3px;width:1px;background:var(--ink-faint);opacity:.7;}

/* stacked composition */
.stack-row{margin-bottom:14px;}
.stack-row:last-child{margin-bottom:0;}
.stack-row-label{font-size:12.5px;font-family:var(--font-mono);margin-bottom:6px;}
.stack-row.a .stack-row-label{color:var(--champ-a);}
.stack-row.b .stack-row-label{color:var(--champ-b);}
.stack-track{display:flex;height:22px;border-radius:5px;overflow:hidden;border:1px solid var(--line-soft);}
.stack-seg{display:flex;align-items:center;justify-content:center;font-size:10.5px;font-family:var(--font-mono);color:rgba(10,13,15,.75);min-width:0;overflow:hidden;white-space:nowrap;}
.dmg-legend{display:flex;gap:16px;margin-top:14px;font-size:12px;color:var(--ink-dim);flex-wrap:wrap;}
.dmg-legend span{display:inline-flex;align-items:center;gap:6px;}
.dmg-legend i{width:10px;height:10px;border-radius:3px;display:inline-block;}

/* stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;}
.stat-card{background:var(--bg-panel-raised);border:1px solid var(--line-soft);border-radius:var(--radius-md);padding:14px 16px;}
.stat-card .label{font-size:11.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.stat-card .value{font-family:var(--font-display);font-weight:700;font-size:22px;}
.stat-card .value.a{color:var(--champ-a);}
.stat-card .value.b{color:var(--champ-b);}
.stat-card .sub{font-size:11.5px;color:var(--ink-faint);margin-top:4px;}

/* donut */
.donut-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap;}
.donut{width:132px;height:132px;border-radius:50%;position:relative;flex:none;}
.donut-center{position:absolute;inset:14px;border-radius:50%;background:var(--bg-panel);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut-center .big{font-family:var(--font-display);font-weight:700;font-size:22px;}
.donut-center .small{font-size:10px;color:var(--ink-faint);text-align:center;padding:0 6px;}
.donut-legend{display:flex;flex-direction:column;gap:8px;font-size:13px;}
.donut-legend .row{display:flex;align-items:center;gap:8px;}
.donut-legend i{width:10px;height:10px;border-radius:3px;flex:none;}

/* river chart */
.river-controls{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.river-btn{
  appearance:none;border:1px solid var(--line);background:var(--bg-panel-raised);color:var(--ink-dim);
  padding:7px 14px;border-radius:999px;font-size:12.5px;cursor:pointer;font-family:var(--font-mono);letter-spacing:.02em;
  transition:border-color .15s var(--ease), color .15s var(--ease);
}
.river-btn:hover{color:var(--ink);}
.river-btn.active{color:var(--bg-void);background:var(--ink);border-color:var(--ink);}
.river-note{font-size:13px;color:var(--ink-dim);margin-bottom:16px;line-height:1.55;min-height:38px;}
.river-svg-wrap{position:relative;}
.river-svg-wrap svg{width:100%;height:auto;display:block;overflow:visible;}
.river-legend{display:flex;gap:18px;margin-top:10px;font-size:12px;color:var(--ink-dim);}
.river-legend span{display:inline-flex;align-items:center;gap:6px;}
.river-legend i{width:14px;height:3px;border-radius:2px;display:inline-block;}

/* level6 mini axis */
.axis-mini{position:relative;height:64px;margin-top:6px;}
.axis-mini .line{position:absolute;left:0;right:0;top:34px;height:1px;background:var(--line);}
.axis-mini .pt{position:absolute;top:24px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;}
.axis-mini .pt .dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--bg-panel);}
.axis-mini .pt.a .dot{background:var(--champ-a);}
.axis-mini .pt.b .dot{background:var(--champ-b);}
.axis-mini .pt .lbl{font-family:var(--font-mono);font-size:11px;white-space:nowrap;}
.axis-mini .pt.a .lbl{color:var(--champ-a);margin-top:16px;}
.axis-mini .pt.b .lbl{color:var(--champ-b);margin-top:-32px;}

/* raw table */
.raw-toolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:14px;}
.raw-btn{
  appearance:none;border:1px solid var(--line);background:var(--bg-panel-raised);color:var(--ink-dim);
  padding:8px 14px;border-radius:var(--radius-sm);font-size:12.5px;cursor:pointer;font-family:var(--font-body);
  transition:border-color .15s var(--ease), color .15s var(--ease);
}
.raw-btn:hover{color:var(--ink);border-color:var(--ink-faint);}
.raw-table{width:100%;border-collapse:collapse;font-size:13px;}
.raw-table th{text-align:left;font-family:var(--font-mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);padding:8px 10px;border-bottom:1px solid var(--line);}
.raw-table td{padding:8px 10px;border-bottom:1px solid var(--line-soft);color:var(--ink-dim);}
.raw-table td.metric{color:var(--ink);}
.raw-table td.va{color:var(--champ-a);font-family:var(--font-mono);}
.raw-table td.vb{color:var(--champ-b);font-family:var(--font-mono);}
.raw-table tr:hover td{background:var(--bg-panel-raised);}

/* glossary */
.glossary{margin-top:40px;}
.glossary h2{font-size:15px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;}
.gloss-item{border-bottom:1px solid var(--line-soft);}
.gloss-q{
  width:100%;text-align:left;background:none;border:none;padding:14px 4px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;color:var(--ink);font-size:14px;font-weight:500;
}
.gloss-q .chev{color:var(--ink-faint);transition:transform .2s var(--ease);}
.gloss-item.open .gloss-q .chev{transform:rotate(45deg);}
.gloss-a{max-height:0;overflow:hidden;transition:max-height .25s var(--ease);}
.gloss-a p{padding:0 4px 16px;color:var(--ink-dim);font-size:13.5px;line-height:1.6;}

/* footer */
.site-footer{margin-top:50px;padding-top:20px;border-top:1px solid var(--line);color:var(--ink-faint);font-size:12.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}

/* tooltip */
#tooltip{
  position:fixed;z-index:100;pointer-events:none;background:var(--bg-panel-raised);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:9px 12px;font-size:12.5px;color:var(--ink);max-width:260px;
  box-shadow:0 12px 28px -10px rgba(0,0,0,.8);opacity:0;transform:translateY(4px);transition:opacity .12s, transform .12s;
  line-height:1.5;
}
#tooltip.show{opacity:1;transform:translateY(0);}
#tooltip .tt-title{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);margin-bottom:4px;}

/* responsive */
@media (max-width:860px){
  .picker-console{grid-template-columns:1fr;}
  .vs-divider{flex-direction:row;width:100%;padding:4px 0;}
  .panel-grid{grid-template-columns:1fr;}
  .verdict-foot{grid-template-columns:1fr;}
  .matchup-title{font-size:26px;}
}
@media (max-width:560px){
  .shell{padding:0 14px 60px;}
  .topbar-inner{padding:14px;}
  .role-pills{width:100%;justify-content:space-between;}
  .role-pill{padding:7px 10px;font-size:12px;flex:1;text-align:center;}
}
</style>
</head>
<body>

<div id="tooltip" role="tooltip"></div>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">MATCHUP<em>LAB</em></div>
      <div class="brand-tag">analisi di corsia</div>
    </div>
    <nav class="role-pills" id="rolePills" aria-label="Seleziona ruolo"></nav>
  </div>
</header>

<div class="shell">

  <section class="picker">
    <div class="picker-head">
      <h2>Scegli il matchup</h2>
    </div>
    <div class="picker-console">
      <div class="slot slot-a">
        <div class="slot-label"><span class="slot-dot"></span>Campione A</div>
        <div class="combobox" id="comboA">
          <input type="text" role="combobox" aria-expanded="false" aria-autocomplete="list" placeholder="Cerca un campione…" autocomplete="off">
          <div class="combobox-list" role="listbox"></div>
        </div>
        <div class="slot-hint" id="hintA"></div>
      </div>

      <div class="vs-divider">
        <span class="vs-mark">VS</span>
        <button class="swap-btn" id="swapBtn" title="Inverti i due campioni" aria-label="Inverti i due campioni">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
        </button>
      </div>

      <div class="slot slot-b">
        <div class="slot-label"><span class="slot-dot"></span>Campione B</div>
        <div class="combobox" id="comboB">
          <input type="text" role="combobox" aria-expanded="false" aria-autocomplete="list" placeholder="Scegli prima il campione A" autocomplete="off" disabled>
          <div class="combobox-list" role="listbox"></div>
        </div>
        <div class="slot-hint" id="hintB"></div>
      </div>
    </div>

    <div class="chips-row">
      <div class="chips-label">Matchup più giocati in questo ruolo</div>
      <div class="chips" id="chipsRow"></div>
    </div>
  </section>

  <section class="empty-state" id="emptyState" hidden></section>

  <section class="dossier" id="dossier" hidden>
    <div class="verdict-band" id="verdictBand"></div>

    <nav class="tabs" id="tabBar" aria-label="Sezioni di analisi">
      <button class="tab-btn active" data-tab="overview">Panoramica</button>
      <button class="tab-btn" data-tab="trajectory">Andamento Partita</button>
      <button class="tab-btn" data-tab="combat">Combattimento</button>
      <button class="tab-btn" data-tab="economy">Oro, XP &amp; Snowball</button>
      <button class="tab-btn" data-tab="objectives">Obiettivi &amp; Torri</button>
      <button class="tab-btn" data-tab="raw">Dati Grezzi</button>
    </nav>

    <div class="tab-panel active" id="panel-overview"></div>
    <div class="tab-panel" id="panel-trajectory"></div>
    <div class="tab-panel" id="panel-combat"></div>
    <div class="tab-panel" id="panel-economy"></div>
    <div class="tab-panel" id="panel-objectives"></div>
    <div class="tab-panel" id="panel-raw"></div>
  </section>

  <section class="glossary">
    <h2>Glossario delle metriche</h2>
    <div id="glossaryList"></div>
  </section>

  <footer class="site-footer">
    <span id="footerStats"></span>
    <span>Dati aggregati da partite ranked · nessuna informazione personale o di singola partita</span>
  </footer>

</div>

<script src="matchup_data.js"></script>
<script src="app.js"></script>
</body>
</html>
