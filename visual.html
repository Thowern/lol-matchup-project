<title>Matchup Lab — Analisi 1v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

/* ========================================================================== 
   MATCHUP LAB 1V1 — coherent visual system
   ========================================================================== */
:root {
  color-scheme: dark;

  /* ==========================================================================
     COLOR CONSTANTS — tweak here
     --------------------------------------------------------------------------
     Cambia questi valori per modificare tutta la palette. I derivati sotto si
     aggiornano automaticamente: soft, faint, line, glow, stati e damage colors.
     ========================================================================== */

  /* Neutrals */
  --neutral-h: 240;
  --neutral-c: 0.024;

  --void-l: 10.5%;
  --root-l: 12.2%;
  --surface-0-l: 13%;
  --surface-1-l: 17%;
  --surface-2-l: 21%;
  --surface-3-l: 26%;

  /* Ink */
  --ink-h: 230;
  --ink-c: 0.014;

  /* Team colors: stessa luminanza e stessa croma, cambia solo la hue. */
  --team-l: 72%;
  --team-c: 0.17;
  --team-a-h: 222;
  --team-b-h: 24;

  /* Semantic colors */
  --success-l: 76%;
  --success-c: 0.15;
  --success-h: 148;

  --warning-l: 80%;
  --warning-c: 0.15;
  --warning-h: 84;

  --danger-l: 70%;
  --danger-c: 0.18;
  --danger-h: 28;

  --info-l: 74%;
  --info-c: 0.15;
  --info-h: 244;

  /* Damage colors */
  --dmg-phys-l: 74%;
  --dmg-phys-c: 0.13;
  --dmg-phys-h: 72;

  --dmg-magic-l: 72%;
  --dmg-magic-c: 0.15;
  --dmg-magic-h: 284;

  --dmg-true-l: 84%;
  --dmg-true-c: 0.075;
  --dmg-true-h: 188;

  /* Alpha constants */
  --alpha-soft: 0.16;
  --alpha-faint: 0.075;
  --alpha-line: 0.42;
  --alpha-glow: 0.26;

  --alpha-state-soft: 0.15;
  --alpha-state-line: 0.38;
  --alpha-damage-soft: 0.16;

  /* ==========================================================================
     Typography
     ========================================================================== */

  --font-sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;

  /* ==========================================================================
     Neutral scale
     ========================================================================== */

  --bg-void: oklch(var(--void-l) 0.018 var(--neutral-h));
  --bg-root: oklch(var(--root-l) 0.020 var(--neutral-h));

  --surface-0: oklch(var(--surface-0-l) 0.020 var(--neutral-h));
  --surface-1: oklch(var(--surface-1-l) var(--neutral-c) var(--neutral-h));
  --surface-2: oklch(var(--surface-2-l) calc(var(--neutral-c) + 0.004) var(--neutral-h));
  --surface-3: oklch(var(--surface-3-l) calc(var(--neutral-c) + 0.008) var(--neutral-h));

  --bg-panel: var(--surface-1);
  --bg-panel-raised: var(--surface-2);
  --bg-panel-hover: var(--surface-3);
  --bg-panel-glass: oklch(var(--surface-1-l) var(--neutral-c) var(--neutral-h) / 0.74);

  --line: oklch(100% 0 0 / 0.10);
  --line-soft: oklch(100% 0 0 / 0.065);
  --line-strong: oklch(100% 0 0 / 0.17);

  /* ==========================================================================
     Text / ink
     ========================================================================== */

  --ink: oklch(96% var(--ink-c) var(--ink-h));
  --ink-soft: oklch(86% calc(var(--ink-c) + 0.002) var(--ink-h));
  --ink-dim: oklch(68% calc(var(--ink-c) + 0.006) var(--ink-h));
  --ink-faint: oklch(50% calc(var(--ink-c) + 0.010) var(--ink-h));
  --ink-muted: oklch(39% calc(var(--ink-c) + 0.010) var(--ink-h));

  /* ==========================================================================
     Team A / Team B
     ========================================================================== */

  --champ-a: oklch(var(--team-l) var(--team-c) var(--team-a-h));
  --champ-a-soft: oklch(var(--team-l) var(--team-c) var(--team-a-h) / var(--alpha-soft));
  --champ-a-faint: oklch(var(--team-l) var(--team-c) var(--team-a-h) / var(--alpha-faint));
  --champ-a-line: oklch(var(--team-l) var(--team-c) var(--team-a-h) / var(--alpha-line));
  --champ-a-glow: oklch(var(--team-l) var(--team-c) var(--team-a-h) / var(--alpha-glow));

  --champ-b: oklch(var(--team-l) var(--team-c) var(--team-b-h));
  --champ-b-soft: oklch(var(--team-l) var(--team-c) var(--team-b-h) / var(--alpha-soft));
  --champ-b-faint: oklch(var(--team-l) var(--team-c) var(--team-b-h) / var(--alpha-faint));
  --champ-b-line: oklch(var(--team-l) var(--team-c) var(--team-b-h) / var(--alpha-line));
  --champ-b-glow: oklch(var(--team-l) var(--team-c) var(--team-b-h) / var(--alpha-glow));

  --champ-a-soft-solid: oklch(27% 0.070 var(--team-a-h));
  --champ-b-soft-solid: oklch(27% 0.070 var(--team-b-h));

  --team-a: var(--champ-a);
  --team-a-soft: var(--champ-a-soft);
  --team-a-faint: var(--champ-a-faint);
  --team-a-line: var(--champ-a-line);
  --team-a-glow: var(--champ-a-glow);

  --team-b: var(--champ-b);
  --team-b-soft: var(--champ-b-soft);
  --team-b-faint: var(--champ-b-faint);
  --team-b-line: var(--champ-b-line);
  --team-b-glow: var(--champ-b-glow);

  /* ==========================================================================
     Semantic states
     ========================================================================== */

  --success: oklch(var(--success-l) var(--success-c) var(--success-h));
  --success-soft: oklch(var(--success-l) var(--success-c) var(--success-h) / var(--alpha-state-soft));
  --success-line: oklch(var(--success-l) var(--success-c) var(--success-h) / var(--alpha-state-line));
  --success-glow: oklch(var(--success-l) var(--success-c) var(--success-h) / 0.24);

  --warning: oklch(var(--warning-l) var(--warning-c) var(--warning-h));
  --warning-soft: oklch(var(--warning-l) var(--warning-c) var(--warning-h) / var(--alpha-state-soft));
  --warning-line: oklch(var(--warning-l) var(--warning-c) var(--warning-h) / var(--alpha-state-line));
  --warning-glow: oklch(var(--warning-l) var(--warning-c) var(--warning-h) / 0.24);

  --danger: oklch(var(--danger-l) var(--danger-c) var(--danger-h));
  --danger-soft: oklch(var(--danger-l) var(--danger-c) var(--danger-h) / var(--alpha-state-soft));
  --danger-line: oklch(var(--danger-l) var(--danger-c) var(--danger-h) / 0.40);
  --danger-glow: oklch(var(--danger-l) var(--danger-c) var(--danger-h) / 0.24);

  --info: oklch(var(--info-l) var(--info-c) var(--info-h));
  --info-soft: oklch(var(--info-l) var(--info-c) var(--info-h) / var(--alpha-state-soft));
  --info-line: oklch(var(--info-l) var(--info-c) var(--info-h) / var(--alpha-state-line));
  --info-glow: oklch(var(--info-l) var(--info-c) var(--info-h) / 0.24);

  --warn: var(--danger);
  --warn-soft: var(--danger-soft);
  --mid: var(--warning);
  --mid-soft: var(--warning-soft);

  /* ==========================================================================
     Damage colors
     ========================================================================== */

  --dmg-phys: oklch(var(--dmg-phys-l) var(--dmg-phys-c) var(--dmg-phys-h));
  --dmg-phys-soft: oklch(var(--dmg-phys-l) var(--dmg-phys-c) var(--dmg-phys-h) / var(--alpha-damage-soft));
  --dmg-phys-line: oklch(var(--dmg-phys-l) var(--dmg-phys-c) var(--dmg-phys-h) / 0.38);

  --dmg-magic: oklch(var(--dmg-magic-l) var(--dmg-magic-c) var(--dmg-magic-h));
  --dmg-magic-soft: oklch(var(--dmg-magic-l) var(--dmg-magic-c) var(--dmg-magic-h) / var(--alpha-damage-soft));
  --dmg-magic-line: oklch(var(--dmg-magic-l) var(--dmg-magic-c) var(--dmg-magic-h) / 0.38);

  --dmg-true: oklch(var(--dmg-true-l) var(--dmg-true-c) var(--dmg-true-h));
  --dmg-true-soft: oklch(var(--dmg-true-l) var(--dmg-true-c) var(--dmg-true-h) / var(--alpha-damage-soft));
  --dmg-true-line: oklch(var(--dmg-true-l) var(--dmg-true-c) var(--dmg-true-h) / 0.38);

  /* ==========================================================================
     Spacing
     ========================================================================== */

  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-7: 32px;
  --space-8: 40px;
  --space-9: 48px;
  --space-10: 64px;
  --space-11: 80px;

  /* ==========================================================================
     Radius
     ========================================================================== */

  --radius-xs: 8px;
  --radius-sm: 12px;
  --radius-md: 18px;
  --radius-lg: 26px;
  --radius-xl: 34px;
  --radius-2xl: 44px;
  --radius-pill: 999px;

  /* ==========================================================================
     Shadows / glass / motion
     ========================================================================== */

  --shadow-card:
    0 1px 0 oklch(100% 0 0 / 0.045) inset,
    0 20px 70px oklch(0% 0 0 / 0.34);

  --shadow-elevated:
    0 1px 0 oklch(100% 0 0 / 0.06) inset,
    0 30px 100px oklch(0% 0 0 / 0.44);

  --shadow-soft:
    0 16px 55px oklch(0% 0 0 / 0.26);

  --blur-glass: blur(18px) saturate(1.1);

  --ease: cubic-bezier(.22,.61,.36,1);
  --ease-out: cubic-bezier(.22,.61,.36,1);
  --ease-emphatic: cubic-bezier(.16,1,.3,1);

  --duration-fast: 140ms;
  --duration-normal: 240ms;
  --duration-slow: 620ms;

  /* ==========================================================================
     Layout
     ========================================================================== */

  --shell-max: 1280px;
  --topbar-height: 72px;
}

.raw-compact details{border:1px solid var(--line-soft);border-radius:var(--radius-lg);background:oklch(0% 0 0 / .10);overflow:hidden}.raw-compact summary{cursor:pointer;padding:var(--space-4);color:var(--ink-soft);font-weight:800}.raw-toolbar{display:flex;justify-content:flex-end;gap:var(--space-2);padding:0 var(--space-4) var(--space-4)}.raw-btn{appearance:none;min-height:36px;padding:0 13px;border:1px solid var(--line);border-radius:var(--radius-pill);color:var(--ink-dim);background:linear-gradient(180deg,var(--surface-2),var(--surface-1));cursor:pointer;font-size:12px;font-weight:750}.raw-btn:hover{color:var(--ink);border-color:var(--line-strong)}.raw-table{width:100%;min-width:680px;border-collapse:collapse;font-size:13px}.raw-table th{padding:12px 14px;border-bottom:1px solid var(--line);color:var(--ink-faint);background:var(--surface-2);font-family:var(--font-mono);font-size:10.5px;font-weight:850;text-align:left;text-transform:uppercase;letter-spacing:.08em}.raw-table td{padding:11px 14px;border-bottom:1px solid var(--line-soft);color:var(--ink-dim)}.raw-table td.metric{color:var(--ink-soft);font-weight:650}.raw-table td.va{color:var(--champ-a);font-family:var(--font-mono)}.raw-table td.vb{color:var(--champ-b);font-family:var(--font-mono)}

<body>

<div id="tooltip" role="tooltip"></div>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand" aria-label="Matchup Intelligence">
      <div class="brand-mark"><span>MATCHUP</span><em>LAB</em></div>
      <div class="brand-tag">analisi matchup</div>
    </div>

    <nav class="nav-links" aria-label="Navigazione moduli">
      <a class="nav-link active" href="./visual.html" aria-current="page">Matchup 1v1</a>
      <a class="nav-link" href="./tm_data.html">Modalità Team</a>
    </nav>

    <div class="data-status-pill loading" id="dataStatus">Caricamento dati</div>
    <nav class="role-pills" id="rolePills" aria-label="Seleziona ruolo"></nav>
  </div>
</header>

<div class="shell">

  <section class="picker">
    <div class="picker-head">
      <h2>Scegli il matchup</h2>
    </div>
    <div class="picker-console">
      <div class="slot slot-a">
        <div class="slot-label"><span class="slot-dot"></span>Campione A</div>
        <div class="combobox" id="comboA">
          <input type="text" role="combobox" aria-expanded="false" aria-autocomplete="list" placeholder="Cerca un campione…" autocomplete="off">
          <div class="combobox-list" role="listbox"></div>
        </div>
        <div class="slot-hint" id="hintA"></div>
      </div>

      <div class="vs-divider">
        <span class="vs-mark">VS</span>
        <button class="swap-btn" id="swapBtn" title="Inverti i due campioni" aria-label="Inverti i due campioni">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
        </button>
      </div>

      <div class="slot slot-b">
        <div class="slot-label"><span class="slot-dot"></span>Campione B</div>
        <div class="combobox" id="comboB">
          <input type="text" role="combobox" aria-expanded="false" aria-autocomplete="list" placeholder="Scegli prima il campione A" autocomplete="off" disabled>
          <div class="combobox-list" role="listbox"></div>
        </div>
        <div class="slot-hint" id="hintB"></div>
      </div>
    </div>

    <div class="chips-row">
      <div class="chips-label">Matchup più giocati in questo ruolo</div>
      <div class="chips" id="chipsRow"></div>
    </div>
  </section>

  <section class="empty-state" id="emptyState" hidden></section>

  <section class="dossier" id="dossier" hidden>
    <div class="verdict-band" id="verdictBand"></div>

    <nav class="tabs" id="tabBar" aria-label="Sezioni di analisi">
      <button class="tab-btn active" data-tab="overview">Panoramica</button>
      <button class="tab-btn" data-tab="trajectory">Andamento Partita</button>
      <button class="tab-btn" data-tab="combat">Combattimento</button>
      <button class="tab-btn" data-tab="economy">Oro, XP &amp; Snowball</button>
      <button class="tab-btn" data-tab="objectives">Obiettivi &amp; Torri</button>
      <button class="tab-btn" data-tab="raw">Dettaglio</button>
    </nav>

    <div class="tab-panel active" id="panel-overview"></div>
    <div class="tab-panel" id="panel-trajectory"></div>
    <div class="tab-panel" id="panel-combat"></div>
    <div class="tab-panel" id="panel-economy"></div>
    <div class="tab-panel" id="panel-objectives"></div>
    <div class="tab-panel" id="panel-raw"></div>
  </section>

  <section class="glossary">
    <h2>Glossario delle metriche</h2>
    <div id="glossaryList"></div>
  </section>

  <footer class="site-footer">
    <span id="footerStats"></span>
    <span>Dati aggregati da partite ranked · nessuna informazione personale o di singola partita</span>
  </footer>

</div>

<script src="matchup_data.js"></script>
<script src="app.js"></script>
</body>
</html>
