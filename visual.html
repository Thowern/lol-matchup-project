  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: var(--space-3);
}

.stack-row-head strong {
  color: var(--ink);
  font-size: 14px;
  font-weight: 800;
}

.stack-row.a .stack-row-head strong {
  color: var(--champ-a);
}

.stack-row.b .stack-row-head strong {
  color: var(--champ-b);
}

.stack-row-head em {
  color: var(--ink-faint);
  font-style: normal;
  font-family: var(--font-mono);
  font-size: 11px;
}

.stack-track {
  display: flex;
  height: 28px;
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-md);
  background: oklch(0% 0 0 / 0.16);
  overflow: hidden;
}

.stack-seg {
  display: grid;
  place-items: center;
  min-width: 0;
  color: oklch(10% 0.018 240 / 0.76);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 850;
  cursor: help;
}

.stack-seg span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.stack-empty {
  display: grid;
  place-items: center;
  width: 100%;
  color: var(--ink-faint);
  font-size: 12px;
}

.dmg-legend {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  flex-wrap: wrap;
  margin-top: var(--space-5);
  color: var(--ink-dim);
  font-size: 12px;
}

.dmg-legend span {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
}

.dmg-legend i {
  width: 11px;
  height: 11px;
  border-radius: 4px;
}

/* ==========================================================================
   Economy / Snowball
   ========================================================================== */

.economy-section {
  position: relative;
}

.economy-grid {
  align-items: stretch;
}

.economy-card {
  min-height: 100%;
}

.auc-showcase {
  display: grid;
  gap: var(--space-4);
}

.auc-row {
  padding: var(--space-4);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg);
  background: oklch(0% 0 0 / 0.12);
}

.auc-row.a {
  border-color: var(--champ-a-line);
}

.auc-row.b {
  border-color: var(--champ-b-line);
}

.auc-row-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: var(--space-3);
  margin-bottom: var(--space-3);
}

.auc-row-head strong {
  font-size: 16px;
  font-weight: 850;
}

.auc-row.a .auc-row-head strong {
  color: var(--champ-a);
}

.auc-row.b .auc-row-head strong {
  color: var(--champ-b);
}

.auc-row-head span {
  color: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 11px;
}

.auc-meter {
  position: relative;
  height: 24px;
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-pill);
  background: oklch(0% 0 0 / 0.16);
  overflow: hidden;
}

.auc-fill {
  height: 100%;
  border-radius: inherit;
  background:
    linear-gradient(
      90deg,
      var(--info-soft),
      var(--info)
    );
  transition: width 560ms var(--ease-emphatic);
}

.auc-row.a .auc-fill {
  background:
    linear-gradient(
      90deg,
      var(--champ-a-soft),
      var(--champ-a)
    );
}

.auc-row.b .auc-fill {
  background:
    linear-gradient(
      90deg,
      var(--champ-b-soft),
      var(--champ-b)
    );
}

.auc-baseline,
.auc-value {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 2;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 850;
}

.auc-baseline {
  left: 10px;
  color: var(--ink-faint);
}

.auc-value {
  right: 10px;
  color: var(--ink);
}

.auc-row p {
  margin-top: var(--space-2);
  color: var(--ink-faint);
  font-size: 12px;
}

.capitalization-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--space-4);
}

.snowball-layout {
  display: grid;
  grid-template-columns: 260px minmax(0, 1fr);
  gap: var(--space-6);
  align-items: center;
}

.snowball-donut-wrap {
  justify-content: center;
}

.snowball-story {
  min-width: 0;
}

.snowball-matrix {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--space-3);
}

.snowball-cell {
  padding: var(--space-4);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(
      180deg,
      var(--surface-3),
      oklch(18% 0.026 240)
    );
}

.snowball-cell.a {
  border-color: var(--champ-a-line);
}

.snowball-cell.b {
  border-color: var(--champ-b-line);
}

.snowball-cell span {
  display: block;
  color: var(--ink-faint);
  font-size: 11px;
}

.snowball-cell.a span {
  color: var(--champ-a);
}

.snowball-cell.b span {
  color: var(--champ-b);
}

.snowball-cell em {
  display: block;
  margin-top: 3px;
  color: var(--ink-faint);
  font-style: normal;
  font-size: 11px;
}

.snowball-cell strong {
  display: block;
  margin-top: var(--space-2);
  color: var(--ink);
  font-size: 24px;
  font-weight: 850;
  line-height: 1;
  letter-spacing: -0.055em;
}

.snowball-cell.a strong {
  color: var(--champ-a);
}

.snowball-cell.b strong {
  color: var(--champ-b);
}

.snowball-cell-meter {
  height: 7px;
  margin-top: var(--space-3);
  border-radius: var(--radius-pill);
  background: var(--line-soft);
  overflow: hidden;
}

.snowball-cell-meter i {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: var(--ink-faint);
}

.snowball-cell.a .snowball-cell-meter i {
  background: var(--champ-a);
}

.snowball-cell.b .snowball-cell-meter i {
  background: var(--champ-b);
}

/* ==========================================================================
   Objectives
   ========================================================================== */

.objectives-section {
  position: relative;
}

.objectives-grid {
  align-items: stretch;
}

.objectives-summary {
  display: grid;
}

.objective-card {
  min-height: 100%;
}

.objective-focus {
  display: flex;
  align-items: center;
  gap: var(--space-5);
  flex-wrap: wrap;
}

.objective-donut {
  width: 140px;
  height: 140px;
}

.objective-story {
  min-width: 180px;
  flex: 1;
}

.objective-story strong {
  display: block;
  margin-top: var(--space-2);
  color: var(--ink);
  font-size: 26px;
  font-weight: 850;
  line-height: 1;
  letter-spacing: -0.055em;
}

.objective-card.tone-a .objective-story strong {
  color: var(--champ-a);
}

.objective-card.tone-b .objective-story strong {
  color: var(--champ-b);
}

.objective-story p {
  margin-top: var(--space-2);
  color: var(--ink-faint);
  font-size: 13px;
}

.objective-diff-showcase {
  padding: var(--space-5);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg);
  background: oklch(0% 0 0 / 0.12);
}

.objective-diff-showcase strong {
  display: block;
  margin-top: var(--space-2);
  color: var(--ink);
  font-size: 34px;
  font-weight: 850;
  line-height: 1;
  letter-spacing: -0.065em;
}

.objective-diff-showcase.positive strong {
  color: var(--success);
}

.objective-diff-showcase.negative strong {
  color: var(--danger);
}

.objective-diff-showcase p {
  margin-top: var(--space-3);
  color: var(--ink-faint);
  font-size: 13px;
  line-height: 1.55;
}

/* ==========================================================================
   Raw table / export
   ========================================================================== */

.raw-section {
  position: relative;
}

.raw-card {
  padding: 0;
}

.raw-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
  padding: var(--space-5);
  border-bottom: 1px solid var(--line);
}

.raw-toolbar strong {
  display: block;
  color: var(--ink);
  font-size: 17px;
  font-weight: 850;
  letter-spacing: -0.035em;
}

.raw-toolbar span {
  display: block;
  margin-top: 3px;
  color: var(--ink-faint);
  font-size: 12px;
}

.raw-actions {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  flex-wrap: wrap;
}

.raw-btn {
  appearance: none;
  min-height: 36px;
  padding: 0 13px;
  border: 1px solid var(--line);
  border-radius: var(--radius-pill);
  color: var(--ink-dim);
  background:
    linear-gradient(
      180deg,
      var(--surface-2),
      var(--surface-1)
    );
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  transition:
    color var(--duration-fast) var(--ease),
    border-color var(--duration-fast) var(--ease),
    transform var(--duration-fast) var(--ease);
}

.raw-btn:hover {
  color: var(--ink);
  border-color: var(--line-strong);
  transform: translateY(-1px);
}

.raw-btn:focus-visible {
  outline: 2px solid var(--champ-a);
  outline-offset: 3px;
}

.raw-table-wrap {
  width: 100%;
  overflow: auto;
}

.raw-table {
  width: 100%;
  min-width: 720px;
  border-collapse: collapse;
  font-size: 13px;
}

.raw-table th {
  position: sticky;
  top: 0;
  z-index: 2;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  color: var(--ink-faint);
  background: var(--surface-2);
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 800;
  text-align: left;
  text-transform: uppercase;
  letter-spacing: .08em;
}

.raw-table td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--line-soft);
  color: var(--ink-dim);
  vertical-align: top;
}

.raw-table tr:hover td {
  background: oklch(100% 0 0 / 0.025);
}

.raw-table td.metric {
  color: var(--ink-soft);
  font-weight: 650;
}

.raw-table td.va,
.raw-table td.vb {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
}

.raw-table td.va {
  color: var(--champ-a);
}

.raw-table td.vb {
  color: var(--champ-b);
}

.raw-group-row td {
  padding: 14px;
  color: var(--ink);
  background:
    linear-gradient(
      90deg,
      var(--champ-a-faint),
      transparent 38%,
      var(--champ-b-faint)
    );
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 850;
  text-transform: uppercase;
  letter-spacing: .10em;
}

.raw-note {
  margin: var(--space-5);
}

/* ==========================================================================
   Glossary
   ========================================================================== */

.glossary {
  margin-top: var(--space-10);
}

.glossary h2 {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-4);
  color: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .13em;
}

.glossary h2::before {
  content: "";
  width: 28px;
  height: 1px;
  background: linear-gradient(90deg, var(--champ-a), transparent);
}

.glossary-controls {
  display: grid;
  gap: var(--space-3);
  margin-bottom: var(--space-4);
  padding: var(--space-4);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  background:
    linear-gradient(
      180deg,
      var(--surface-2),
      var(--surface-1)
    );
  box-shadow: var(--shadow-card);
}

.glossary-search input {
  width: 100%;
  height: 44px;
  padding: 0 var(--space-4);
  border: 1px solid var(--line);
  border-radius: var(--radius-pill);
  outline: none;
  color: var(--ink);
  background: oklch(0% 0 0 / 0.14);
  font-size: 14px;
}

.glossary-search input:focus {
  border-color: var(--champ-a-line);
  box-shadow: 0 0 0 4px var(--champ-a-faint);
}

.glossary-filter {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
}

.gloss-filter {
  appearance: none;
  min-height: 32px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius-pill);
  color: var(--ink-faint);
  background: transparent;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .08em;
}

.gloss-filter:hover {
  color: var(--ink);
  border-color: var(--line-strong);
}

.gloss-filter.active {
  color: var(--champ-a);
  border-color: var(--champ-a-line);
  background: var(--champ-a-faint);
}

#glossaryList {
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  background:
    linear-gradient(
      180deg,
      var(--surface-2),
      var(--surface-1)
    );
  box-shadow: var(--shadow-card);
  overflow: hidden;
}

.gloss-item + .gloss-item {
  border-top: 1px solid var(--line-soft);
}

.gloss-q {
  appearance: none;
  width: 100%;
  min-height: 66px;
  padding: var(--space-4) var(--space-5);
  border: none;
  color: var(--ink);
  background: transparent;
  cursor: pointer;
  text-align: left;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: var(--space-4);
}

.gloss-q:hover {
  background: oklch(100% 0 0 / 0.025);
}

.gloss-category {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 0 9px;
  border: 1px solid var(--line);
  border-radius: var(--radius-pill);
  color: var(--ink-faint);
  background: oklch(0% 0 0 / 0.12);
  font-family: var(--font-mono);
  font-size: 9.5px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .08em;
}

.gloss-q strong {
  color: var(--ink-soft);
  font-size: 14px;
  font-weight: 750;
}

.gloss-q .chev {
  display: grid;
  place-items: center;
  width: 28px;
  height: 28px;
  border: 1px solid var(--line);
  border-radius: 50%;
  color: var(--ink-faint);
  font-family: var(--font-mono);
  font-weight: 800;
}

.gloss-item.open .gloss-q .chev {
  color: var(--champ-a);
  border-color: var(--champ-a-line);
  background: var(--champ-a-faint);
}

.gloss-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height 260ms var(--ease);
}

.gloss-a p {
  padding: 0 var(--space-5) var(--space-5);
  color: var(--ink-dim);
  font-size: 13.5px;
  line-height: 1.7;
}

/* ==========================================================================
   Footer
   ========================================================================== */

.site-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: var(--space-4);
  flex-wrap: wrap;
  margin-top: var(--space-8);
  padding-top: var(--space-5);
  border-top: 1px solid var(--line);
  color: var(--ink-faint);
  font-size: 12px;
}

.site-footer span:first-child {
  color: var(--ink-dim);
}

/* ==========================================================================
   Final responsive polish
   ========================================================================== */

@media (max-width: 1080px) {
  .snowball-layout {
    grid-template-columns: 1fr;
  }

  .snowball-donut-wrap {
    justify-content: flex-start;
  }
}

@media (max-width: 860px) {
  .combat-insight-strip,
  .economy-insight-strip,
  .capitalization-grid,
  .snowball-matrix {
    grid-template-columns: 1fr;
  }

  .objective-focus {
    align-items: flex-start;
  }

  .raw-toolbar {
    align-items: flex-start;
    flex-direction: column;
  }

  .raw-actions {
    width: 100%;
  }

  .raw-btn {
    flex: 1;
  }

  .gloss-q {
    grid-template-columns: 1fr auto;
  }

  .gloss-category {
    grid-column: 1 / -1;
    width: max-content;
  }
}

@media (max-width: 620px) {
  body {
    font-size: 14px;
  }

  .picker {
    padding-top: var(--space-7);
  }

  .section-head {
    margin-bottom: var(--space-5);
  }

  .section-head p {
    font-size: 14px;
  }

  .compare-bar-row {
    grid-template-columns: 1fr;
    gap: 6px;
  }

  .compare-name {
    text-align: left;
  }

  .compare-value {
    width: auto;
    text-align: left;
  }

  .combat-insight-card strong,
  .economy-insight strong,
  .snowball-cell strong {
    font-size: 22px;
  }

  .objective-focus {
    flex-direction: column;
  }

  .objective-story {
    min-width: 0;
  }

  .raw-table {
    min-width: 660px;
  }

  .site-footer {
    align-items: flex-start;
    flex-direction: column;
  }
}

@media (max-width: 420px) {
  .shell {
    width: min(100% - 22px, var(--shell-max));
  }

  .topbar-inner {
    width: min(100% - 22px, var(--shell-max));
  }

  .verdict-hero,
  .card,
  .slot,
  .glossary-controls,
  #glossaryList {
    border-radius: var(--radius-lg);
  }

  .tabs {
    margin-left: -4px;
    margin-right: -4px;
  }

  .raw-btn {
    width: 100%;
  }
}

</style>
</head>
<body>

<div id="tooltip" role="tooltip"></div>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">MATCHUP<em>LAB</em></div>
      <div class="brand-tag">analisi di corsia</div>
    </div>
    <nav class="role-pills" id="rolePills" aria-label="Seleziona ruolo"></nav>
  </div>
</header>

<div class="shell">

  <section class="picker">
    <div class="picker-head">
      <h2>Scegli il matchup</h2>
    </div>
    <div class="picker-console">
      <div class="slot slot-a">
        <div class="slot-label"><span class="slot-dot"></span>Campione A</div>
        <div class="combobox" id="comboA">
          <input type="text" role="combobox" aria-expanded="false" aria-autocomplete="list" placeholder="Cerca un campione…" autocomplete="off">
          <div class="combobox-list" role="listbox"></div>
        </div>
        <div class="slot-hint" id="hintA"></div>
      </div>

      <div class="vs-divider">
        <span class="vs-mark">VS</span>
        <button class="swap-btn" id="swapBtn" title="Inverti i due campioni" aria-label="Inverti i due campioni">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
        </button>
      </div>

      <div class="slot slot-b">
        <div class="slot-label"><span class="slot-dot"></span>Campione B</div>
        <div class="combobox" id="comboB">
          <input type="text" role="combobox" aria-expanded="false" aria-autocomplete="list" placeholder="Scegli prima il campione A" autocomplete="off" disabled>
          <div class="combobox-list" role="listbox"></div>
        </div>
        <div class="slot-hint" id="hintB"></div>
      </div>
    </div>

    <div class="chips-row">
      <div class="chips-label">Matchup più giocati in questo ruolo</div>
      <div class="chips" id="chipsRow"></div>
    </div>
  </section>

  <section class="empty-state" id="emptyState" hidden></section>

  <section class="dossier" id="dossier" hidden>
    <div class="verdict-band" id="verdictBand"></div>

    <nav class="tabs" id="tabBar" aria-label="Sezioni di analisi">
      <button class="tab-btn active" data-tab="overview">Panoramica</button>
      <button class="tab-btn" data-tab="trajectory">Andamento Partita</button>
      <button class="tab-btn" data-tab="combat">Combattimento</button>
      <button class="tab-btn" data-tab="economy">Oro, XP &amp; Snowball</button>
      <button class="tab-btn" data-tab="objectives">Obiettivi &amp; Torri</button>
      <button class="tab-btn" data-tab="raw">Dati Grezzi</button>
    </nav>

    <div class="tab-panel active" id="panel-overview"></div>
    <div class="tab-panel" id="panel-trajectory"></div>
    <div class="tab-panel" id="panel-combat"></div>
    <div class="tab-panel" id="panel-economy"></div>
    <div class="tab-panel" id="panel-objectives"></div>
    <div class="tab-panel" id="panel-raw"></div>
  </section>

  <section class="glossary">
    <h2>Glossario delle metriche</h2>
    <div id="glossaryList"></div>
  </section>

  <footer class="site-footer">
    <span id="footerStats"></span>
    <span>Dati aggregati da partite ranked · nessuna informazione personale o di singola partita</span>
  </footer>

</div>

<script src="./matchup_data.js"></script>

<script>
  if (!window.MATCHUP_APP_DATA) {
    console.error(
      '[Matchup Intelligence] matchup_data.js caricato, ma window.MATCHUP_APP_DATA non esiste.'
    );
  } else {
    console.info(
      '[Matchup Intelligence] Dataset caricato:',
      window.MATCHUP_APP_DATA.meta || window.MATCHUP_APP_DATA
    );
  }
</script>

<script src="./app.js"></script>
</body>
</html>
