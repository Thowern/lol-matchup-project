<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matchup Intelligence — Analisi di corsia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ==========================================================================
   MATCHUP INTELLIGENCE — VISUAL SYSTEM
   --------------------------------------------------------------------------
   Principio colore:
   tutta la palette è costruita in OKLCH per ottenere coerenza percettiva.

   Regole:
   - Champion A e Champion B hanno stessa luminanza e stessa croma.
     Cambia solo la hue: nessuno dei due pesa visivamente più dell'altro.
   - I neutrali hanno croma bassissima e luminanza scalata.
   - Warning / success / danger / info hanno intensità percettiva bilanciata.
   - I colori danno sono distinti ma non gridano più dei colori principali.
   ========================================================================== */

:root {
  color-scheme: dark;

  /* -----------------------------------------------------------------------
     Typography
     ----------------------------------------------------------------------- */

  --font-sans:
    Inter,
    ui-sans-serif,
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;

  --font-mono:
    "JetBrains Mono",
    "SFMono-Regular",
    Consolas,
    "Liberation Mono",
    monospace;

  /* -----------------------------------------------------------------------
     OKLCH neutral scale
     -----------------------------------------------------------------------
     Hue fredda costante intorno a 235/245.
     Croma minima per evitare grigi morti, ma senza tingere troppo la UI.
     ----------------------------------------------------------------------- */

  --bg-void: oklch(10.5% 0.018 240);
  --bg-root: oklch(12.2% 0.020 240);
  --bg-panel: oklch(16.5% 0.024 240);
  --bg-panel-raised: oklch(20.5% 0.028 240);
  --bg-panel-hover: oklch(24.5% 0.032 240);
  --bg-panel-glass: oklch(18% 0.026 240 / 0.74);

  --surface-0: oklch(13% 0.020 240);
  --surface-1: oklch(17% 0.024 240);
  --surface-2: oklch(21% 0.028 240);
  --surface-3: oklch(26% 0.032 240);

  --line: oklch(100% 0 0 / 0.10);
  --line-soft: oklch(100% 0 0 / 0.065);
  --line-strong: oklch(100% 0 0 / 0.17);

  --ink: oklch(96% 0.012 230);
  --ink-soft: oklch(86% 0.016 230);
  --ink-dim: oklch(68% 0.020 230);
  --ink-faint: oklch(50% 0.024 230);
  --ink-muted: oklch(39% 0.024 230);

  /* -----------------------------------------------------------------------
     Champion colors
     -----------------------------------------------------------------------
     Stessa L, stessa C.
     Solo H cambia.
     A = blu/ciano tecnologico.
     B = rosso/corallo caldo.
     ----------------------------------------------------------------------- */

  --champ-a: oklch(72% 0.17 222);
  --champ-a-soft: oklch(72% 0.17 222 / 0.16);
  --champ-a-faint: oklch(72% 0.17 222 / 0.075);
  --champ-a-line: oklch(72% 0.17 222 / 0.42);
  --champ-a-glow: oklch(72% 0.17 222 / 0.26);

  --champ-b: oklch(72% 0.17 24);
  --champ-b-soft: oklch(72% 0.17 24 / 0.16);
  --champ-b-faint: oklch(72% 0.17 24 / 0.075);
  --champ-b-line: oklch(72% 0.17 24 / 0.42);
  --champ-b-glow: oklch(72% 0.17 24 / 0.26);

  /* Alias richiesti dal nuovo app.js */
  --champ-a-soft-solid: oklch(27% 0.070 222);
  --champ-b-soft-solid: oklch(27% 0.070 24);

  /* -----------------------------------------------------------------------
     Semantic states
     ----------------------------------------------------------------------- */

  --success: oklch(76% 0.15 148);
  --success-soft: oklch(76% 0.15 148 / 0.15);
  --success-line: oklch(76% 0.15 148 / 0.38);

  --warning: oklch(80% 0.15 84);
  --warning-soft: oklch(80% 0.15 84 / 0.15);
  --warning-line: oklch(80% 0.15 84 / 0.38);

  --danger: oklch(70% 0.18 28);
  --danger-soft: oklch(70% 0.18 28 / 0.15);
  --danger-line: oklch(70% 0.18 28 / 0.40);

  --info: oklch(74% 0.15 244);
  --info-soft: oklch(74% 0.15 244 / 0.15);
  --info-line: oklch(74% 0.15 244 / 0.38);

  /* Compatibilità con vecchi nomi */
  --warn: var(--danger);
  --warn-soft: var(--danger-soft);
  --mid: var(--warning);
  --mid-soft: var(--warning-soft);

  /* -----------------------------------------------------------------------
     Damage colors
     -----------------------------------------------------------------------
     Anche qui stessa logica: distinti, ma con peso visivo controllato.
     ----------------------------------------------------------------------- */

  --dmg-phys: oklch(74% 0.13 72);
  --dmg-magic: oklch(72% 0.15 284);
  --dmg-true: oklch(84% 0.075 188);

  --dmg-phys-soft: oklch(74% 0.13 72 / 0.16);
  --dmg-magic-soft: oklch(72% 0.15 284 / 0.16);
  --dmg-true-soft: oklch(84% 0.075 188 / 0.16);

  /* -----------------------------------------------------------------------
     Spacing scale
     ----------------------------------------------------------------------- */

  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-7: 32px;
  --space-8: 40px;
  --space-9: 48px;
  --space-10: 64px;
  --space-11: 80px;

  /* -----------------------------------------------------------------------
     Radius
     ----------------------------------------------------------------------- */

  --radius-xs: 8px;
  --radius-sm: 12px;
  --radius-md: 18px;
  --radius-lg: 26px;
  --radius-xl: 34px;
  --radius-2xl: 44px;
  --radius-pill: 999px;

  /* -----------------------------------------------------------------------
     Shadows / glass / motion
     ----------------------------------------------------------------------- */

  --shadow-card:
    0 1px 0 oklch(100% 0 0 / 0.045) inset,
    0 20px 70px oklch(0% 0 0 / 0.34);

  --shadow-elevated:
    0 1px 0 oklch(100% 0 0 / 0.06) inset,
    0 30px 100px oklch(0% 0 0 / 0.44);

  --shadow-soft:
    0 16px 55px oklch(0% 0 0 / 0.26);

  --blur-glass: blur(18px) saturate(1.1);

  --ease: cubic-bezier(.22,.61,.36,1);
  --ease-out: cubic-bezier(.22,.61,.36,1);
  --ease-emphatic: cubic-bezier(.16,1,.3,1);

  --duration-fast: 140ms;
  --duration-normal: 240ms;
  --duration-slow: 620ms;

  /* -----------------------------------------------------------------------
     Layout
     ----------------------------------------------------------------------- */

  --shell-max: 1280px;
  --topbar-height: 72px;
}

/* ==========================================================================
   Reset / base
   ========================================================================== */

*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background: var(--bg-void);
  text-rendering: optimizeLegibility;
  scroll-behavior: smooth;
}

body {
  min-height: 100vh;
  margin: 0;
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.55;
  background:
    radial-gradient(
      900px 520px at 12% -12%,
      var(--champ-a-faint),
      transparent 64%
    ),
    radial-gradient(
      880px 500px at 92% -10%,
      var(--champ-b-faint),
      transparent 62%
    ),
    radial-gradient(
      900px 700px at 50% 120%,
      oklch(70% 0.11 260 / 0.055),
      transparent 70%
    ),
    linear-gradient(
      180deg,
      var(--bg-root) 0%,
      var(--bg-void) 52%,
      oklch(8.5% 0.017 240) 100%
    );
  background-attachment: fixed;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  background:
    linear-gradient(var(--line-soft) 1px, transparent 1px),
    linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
  background-size: 52px 52px;
  mask-image: radial-gradient(circle at 50% 0%, black 0%, transparent 72%);
  opacity: 0.32;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% -20%, oklch(100% 0 0 / 0.045), transparent 46%),
    linear-gradient(180deg, transparent, oklch(0% 0 0 / 0.18));
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: .001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .001ms !important;
    scroll-behavior: auto !important;
  }
}

h1,
h2,
h3,
h4,
p {
  margin: 0;
}

h1,
h2,
h3,
h4 {
  color: var(--ink);
  font-weight: 800;
  letter-spacing: -0.035em;
}

p {
  color: var(--ink-dim);
}

button,
input {
  font: inherit;
}

button {
  color: inherit;
}

input {
  color: var(--ink);
}

a {
  color: var(--champ-a);
}

::selection {
  color: var(--ink);
  background: var(--champ-a-soft);
}

[hidden] {
  display: none !important;
}

.mono {
  font-family: var(--font-mono);
}

.micro-label {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 650;
  line-height: 1;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: .105em;
}

.micro-label::before {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: var(--radius-pill);
  background: currentColor;
  opacity: .72;
}

.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
}

.is-rendering {
  cursor: progress;
}

/* ==========================================================================
   Layout shell
   ========================================================================== */

.shell {
  width: min(var(--shell-max), calc(100% - 48px));
  margin: 0 auto;
  padding: 0 0 var(--space-11);
}

@media (max-width: 720px) {
  .shell {
    width: min(100% - 28px, var(--shell-max));
    padding-bottom: var(--space-10);
  }
}

/* ==========================================================================
   Topbar
   ========================================================================== */

.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  min-height: var(--topbar-height);
  border-bottom: 1px solid var(--line);
  background:
    linear-gradient(
      180deg,
      oklch(10.5% 0.018 240 / 0.88),
      oklch(10.5% 0.018 240 / 0.72)
    );
  backdrop-filter: var(--blur-glass);
  -webkit-backdrop-filter: var(--blur-glass);
}

.topbar::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(
      620px 120px at 18% 0%,
      var(--champ-a-faint),
      transparent 72%
    ),
    radial-gradient(
      620px 120px at 82% 0%,
      var(--champ-b-faint),
      transparent 72%
    );
}

.topbar-inner {
  position: relative;
  z-index: 1;
  width: min(var(--shell-max), calc(100% - 48px));
  min-height: var(--topbar-height);
  margin: 0 auto;
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  gap: var(--space-7);
  padding: var(--space-4) 0;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: var(--space-3);
  min-width: max-content;
}

.brand-mark {
  position: relative;
  font-size: 18px;
  font-weight: 850;
  letter-spacing: -0.04em;
  color: var(--ink);
  line-height: 1;
}

.brand-mark::before {
  content: "";
  position: absolute;
  left: -11px;
  top: 50%;
  width: 6px;
  height: 28px;
  border-radius: var(--radius-pill);
  transform: translateY(-50%);
  background:
    linear-gradient(
      180deg,
      var(--champ-a),
      var(--champ-b)
    );
  box-shadow:
    0 0 18px var(--champ-a-glow),
    0 0 22px var(--champ-b-glow);
}

.brand-mark em {
  font-style: normal;
  color: var(--champ-a);
  text-shadow: 0 0 26px var(--champ-a-glow);
}

.brand-tag {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-faint);
  letter-spacing: .06em;
  text-transform: uppercase;
}

/* ==========================================================================
   Role pills
   ========================================================================== */

.role-pills {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: var(--space-2);
  flex-wrap: wrap;
}

.role-pill {
  appearance: none;
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  min-height: 38px;
  padding: 0 15px;
  border: 1px solid var(--line);
  border-radius: var(--radius-pill);
  color: var(--ink-dim);
  background:
    linear-gradient(
      180deg,
      var(--surface-2),
      var(--surface-1)
    );
  cursor: pointer;
  overflow: hidden;
  box-shadow:
    0 1px 0 oklch(100% 0 0 / 0.04) inset,
    0 8px 22px oklch(0% 0 0 / 0.18);
  transition:
    color var(--duration-fast) var(--ease),
    border-color var(--duration-fast) var(--ease),
    transform var(--duration-fast) var(--ease),
    background var(--duration-fast) var(--ease);
}

.role-pill::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(
      120px 52px at 50% 0%,
      var(--champ-a-faint),
      transparent 68%
    );
  opacity: 0;
  transition: opacity var(--duration-fast) var(--ease);
}

.role-pill:hover {
  color: var(--ink);
  border-color: var(--line-strong);
  transform: translateY(-1px);
}

.role-pill:hover::before {
  opacity: 1;
}

.role-pill:focus-visible {
  outline: 2px solid var(--champ-a);
  outline-offset: 3px;
}

.role-pill.active {
  color: var(--ink);
  border-color: var(--champ-a-line);
  background:
    linear-gradient(
      180deg,
      var(--champ-a-soft),
      var(--surface-2)
    );
  box-shadow:
    0 1px 0 oklch(100% 0 0 / 0.06) inset,
    0 0 0 1px var(--champ-a-faint),
    0 16px 38px oklch(0% 0 0 / 0.28),
    0 0 42px var(--champ-a-faint);
}

.role-pill.active::before {
  opacity: 1;
}

.role-pill-label {
  position: relative;
  z-index: 1;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .075em;
  text-transform: uppercase;
}

.role-pill-meta {
  position: relative;
  z-index: 1;
  padding: 3px 7px;
  border-radius: var(--radius-pill);
  color: var(--ink-faint);
  background: oklch(0% 0 0 / 0.20);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 650;
}

.role-pill.active .role-pill-meta {
  color: var(--champ-a);
  background: var(--champ-a-faint);
}

/* ==========================================================================
   Global section rhythm
   ========================================================================== */

.picker {
  padding: var(--space-9) 0 var(--space-6);
}

.picker-head {
  margin-bottom: var(--space-5);
}

.picker-head h2 {
  display: inline-flex;
  align-items: center;
  gap: var(--space-3);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 750;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: .14em;
}

.picker-head h2::before {
  content: "";
  width: 26px;
  height: 1px;
  background: linear-gradient(90deg, var(--champ-a), transparent);
}

.section-kicker {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-3);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: .12em;
}

.section-kicker i {
  width: 42px;
  height: 1px;
  background:
    linear-gradient(
      90deg,
      var(--champ-a),
      var(--champ-b)
    );
  opacity: .72;
}

.section-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: var(--space-6);
  margin-bottom: var(--space-6);
}

.section-head h2 {
  max-width: 760px;
  font-size: clamp(28px, 4.2vw, 52px);
  line-height: .98;
  letter-spacing: -0.065em;
}

.section-head p {
  max-width: 780px;
  margin-top: var(--space-3);
  font-size: 15px;
  color: var(--ink-dim);
}

.dossier {
  margin-top: var(--space-6);
}

/* ==========================================================================
   Responsive topbar/layout
   ========================================================================== */

@media (max-width: 980px) {
  .topbar-inner {
    grid-template-columns: 1fr;
    gap: var(--space-4);
    padding: var(--space-4) 0;
  }

  .role-pills {
    justify-content: flex-start;
  }
}

@media (max-width: 620px) {
  .topbar-inner {
    width: min(100% - 28px, var(--shell-max));
  }

  .brand {
    width: 100%;
    justify-content: space-between;
  }

  .brand-tag {
    font-size: 10px;
  }

  .role-pills {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    width: 100%;
    gap: 6px;
  }

  .role-pill {
    justify-content: center;
    min-height: 36px;
    padding: 0 8px;
  }

  .role-pill-label {
    font-size: 10px;
  }

  .role-pill-meta {
    display: none;
  }

  .section-head h2 {
    font-size: clamp(28px, 10vw, 42px);
  }
}

/* ==========================================================================
   Picker console
   ========================================================================== */

.picker-console {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 76px minmax(0, 1fr);
  gap: var(--space-5);
  align-items: stretch;
}

.slot {
  position: relative;
  min-height: 148px;
  padding: var(--space-5);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  background:
    linear-gradient(
      180deg,
      var(--surface-2),
      var(--surface-1)
    );
  box-shadow: var(--shadow-card);
  overflow: visible;
}

.slot::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  background:
    radial-gradient(
      420px 140px at 18% 0%,
      var(--slot-glow),
      transparent 72%
    );
  opacity: .62;
}

.slot::after {
  content: "";
  position: absolute;
  left: 22px;
  right: 22px;
  top: 0;
  height: 1px;
  background:
    linear-gradient(
      90deg,
      transparent,
      var(--slot-line),
      transparent
    );
  opacity: .85;
}

.slot-a {
  --slot-color: var(--champ-a);
  --slot-soft: var(--champ-a-soft);
  --slot-glow: var(--champ-a-faint);
  --slot-line: var(--champ-a-line);
}

.slot-b {
  --slot-color: var(--champ-b);
  --slot-soft: var(--champ-b-soft);
  --slot-glow: var(--champ-b-faint);
  --slot-line: var(--champ-b-line);
}

.slot-label {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-4);
  color: var(--slot-color);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 750;
  text-transform: uppercase;
  letter-spacing: .13em;
}

.slot-dot {
  width: 8px;
  height: 8px;
  border-radius: var(--radius-pill);
  background: currentColor;
  box-shadow: 0 0 18px currentColor;
}

.slot-hint {
  position: relative;
  z-index: 1;
  min-height: 18px;
  margin-top: var(--space-3);
  color: var(--ink-faint);
  font-size: 12px;
}

/* ==========================================================================
   Combobox
   ========================================================================== */

.combobox {
  position: relative;
  z-index: 5;
}

.combobox.disabled {
  opacity: .72;
}

.combobox input {
  width: 100%;
  height: 56px;
  padding: 0 var(--space-4);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  outline: none;
  color: var(--ink);
  background:
    linear-gradient(
      180deg,
      var(--bg-void),
      oklch(12.6% 0.020 240)
    );
  font-size: clamp(18px, 2vw, 23px);
  font-weight: 800;
  letter-spacing: -0.035em;
  box-shadow:
    0 1px 0 oklch(100% 0 0 / 0.04) inset,
    0 10px 28px oklch(0% 0 0 / 0.18);
  transition:
    border-color var(--duration-fast) var(--ease),
    background var(--duration-fast) var(--ease),
    box-shadow var(--duration-fast) var(--ease);
}

.combobox input::placeholder {
  color: var(--ink-muted);
  font-weight: 650;
}

.combobox input:hover {
  border-color: var(--line-strong);
}

.combobox input:focus {
  border-color: var(--slot-line, var(--champ-a-line));
  box-shadow:
    0 1px 0 oklch(100% 0 0 / 0.055) inset,
    0 0 0 4px var(--slot-glow, var(--champ-a-faint)),
    0 18px 48px oklch(0% 0 0 / 0.26);
}

.combobox input:disabled {
  opacity: .46;
  cursor: not-allowed;
}

.combobox-list {
  position: absolute;
  left: 0;
  right: 0;
  top: calc(100% + 10px);
  z-index: 80;
  display: none;
  max-height: 316px;
  overflow: auto;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(
      180deg,
      oklch(21% 0.030 240 / 0.98),
      oklch(16% 0.024 240 / 0.98)
    );
  box-shadow: var(--shadow-elevated);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: var(--space-2);
}

.combobox-list.open {
  display: block;
  animation: comboReveal 180ms var(--ease-out);
}

@keyframes comboReveal {
  from {
    opacity: 0;
    transform: translateY(-4px) scale(.985);
  }

  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.combobox-option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
  min-height: 44px;
  padding: 0 var(--space-3);
  border: 1px solid transparent;
  border-radius: var(--radius-md);
  color: var(--ink-dim);
  cursor: pointer;
  transition:
    color var(--duration-fast) var(--ease),
    background var(--duration-fast) var(--ease),
    border-color var(--duration-fast) var(--ease);
}

.combobox-option + .combobox-option {
  margin-top: 3px;
}

.combobox-option:hover,
.combobox-option.active {
  color: var(--ink);
  border-color: var(--line);
  background:
    linear-gradient(
      180deg,
      var(--surface-3),
      var(--surface-2)
    );
}

.combo-main {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  min-width: 0;
}

.combo-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 750;
  letter-spacing: -0.02em;
}

.combobox-option .n {
  flex: none;
  color: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 650;
}

.mini-badge {
  display: inline-flex;
  align-items: center;
  min-height: 18px;
  padding: 0 7px;
  border-radius: var(--radius-pill);
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 750;
  letter-spacing: .06em;
  text-transform: uppercase;
}

.mini-badge.low {
  color: var(--danger);
  background: var(--danger-soft);
  border: 1px solid var(--danger-line);
}

.combobox-option.low .n {
  color: var(--danger);
}

.combobox-empty {
  padding: var(--space-5);
  color: var(--ink-faint);
  font-size: 13px;
  text-align: center;
}

/* ==========================================================================
   VS divider / swap
   ========================================================================== */

.vs-divider {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--space-3);
}

.vs-mark {
  position: relative;
  display: grid;
  place-items: center;
  width: 54px;
  height: 54px;
  border: 1px solid var(--line);
  border-radius: 50%;
  color: var(--ink-faint);
  background:
    radial-gradient(circle at 50% 15%, oklch(100% 0 0 / 0.055), transparent 42%),
    linear-gradient(180deg, var(--surface-2), var(--surface-1));
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .12em;
  box-shadow: var(--shadow-soft);
}

.vs-mark::before,
.vs-mark::after {
  content: "";
  position: absolute;
  left: 50%;
  width: 1px;
  height: 34px;
  transform: translateX(-50%);
  background:
    linear-gradient(
      180deg,
      transparent,
      var(--line-strong),
      transparent
    );
}

.vs-mark::before {
  bottom: calc(100% + 8px);
}

.vs-mark::after {
  top: calc(100% + 8px);
}

.swap-btn {
  appearance: none;
  position: relative;
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border: 1px solid var(--line);
  border-radius: 50%;
  color: var(--ink-dim);
  background:
    linear-gradient(
      180deg,
      var(--surface-2),
      var(--surface-1)
    );
  cursor: pointer;
  box-shadow: var(--shadow-soft);
  transition:
    color var(--duration-fast) var(--ease),
    border-color var(--duration-fast) var(--ease),
    transform var(--duration-normal) var(--ease-emphatic),
    box-shadow var(--duration-fast) var(--ease);
}

.swap-btn:hover {
  color: var(--ink);
  border-color: var(--line-strong);
  box-shadow:
    var(--shadow-soft),
    0 0 36px oklch(100% 0 0 / 0.045);
}

.swap-btn:active {
  transform: rotate(180deg) scale(.96);
}

.swap-btn:focus-visible {
  outline: 2px solid var(--champ-a);
  outline-offset: 3px;
}

/* ==========================================================================
   Quick chips
   ========================================================================== */

.chips-row {
  margin-top: var(--space-5);
}

.chips-label {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-3);
  color: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 750;
  text-transform: uppercase;
  letter-spacing: .12em;
}

.chips-label::before {
  content: "";
  width: 22px;
  height: 1px;
  background: var(--line-strong);
}

.chips {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  flex-wrap: wrap;
}

.chip {
  appearance: none;
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  min-height: 36px;
  padding: 0 13px;
  border: 1px solid var(--line);
  border-radius: var(--radius-pill);
  color: var(--ink-dim);
  background:
    linear-gradient(
      180deg,
      var(--surface-2),
      var(--surface-1)
    );
  cursor: pointer;
  overflow: hidden;
  box-shadow:
    0 1px 0 oklch(100% 0 0 / 0.04) inset,
    0 10px 28px oklch(0% 0 0 / 0.16);
  transition:
    color var(--duration-fast) var(--ease),
    border-color var(--duration-fast) var(--ease),
    transform var(--duration-fast) var(--ease),
    background var(--duration-fast) var(--ease);
}

.chip::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(
      90deg,
      var(--champ-a-faint),
      transparent 50%,
      var(--champ-b-faint)
    );
  opacity: 0;
  transition: opacity var(--duration-fast) var(--ease);
}

.chip > * {
  position: relative;
  z-index: 1;
}

.chip:hover {
  color: var(--ink);
  border-color: var(--line-strong);
  transform: translateY(-1px);
}

.chip:hover::before {
  opacity: 1;
}

.chip:focus-visible {
  outline: 2px solid var(--champ-a);
  outline-offset: 3px;
}

.chip .n {
  color: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 700;
}

.matchup-chip {
  padding-left: 8px;
}

.chip-rank {
  display: inline-grid;
  place-items: center;
  min-width: 26px;
  height: 24px;
  border-radius: var(--radius-pill);
  color: var(--champ-a);
  background: var(--champ-a-faint);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 800;
}

.chip-pair {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.chip-pair strong {
  font-weight: 750;
  color: var(--ink-soft);
}

.chip-pair span {
  color: var(--ink-muted);
  font-family: var(--font-mono);
  font-size: 10px;
}

/* ==========================================================================
   Empty state
   ========================================================================== */

.empty-state {
  position: relative;
  margin-top: var(--space-4);
  padding: clamp(48px, 8vw, 86px) var(--space-6);
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius-2xl);
  color: var(--ink-dim);
  text-align: center;
  background:
    radial-gradient(
      500px 220px at 50% 0%,
      oklch(100% 0 0 / 0.045),
      transparent 72%
    ),
    linear-gradient(
      180deg,
      var(--surface-1),
      oklch(12.5% 0.020 240 / 0.72)
    );
  overflow: hidden;
}

.empty-state::before {
  content: "";
  position: absolute;
  inset: 18px;
  border-radius: calc(var(--radius-2xl) - 12px);
  border: 1px solid var(--line-soft);
  pointer-events: none;
}

.empty-orbit {
  position: relative;
  width: 96px;
  height: 96px;
  margin: 0 auto var(--space-5);
  border: 1px solid var(--line);
  border-radius: 50%;
}

.empty-orbit span {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--ink-faint);
}

.empty-orbit span:nth-child(1) {
  left: 50%;
  top: -5px;
  background: var(--champ-a);
  box-shadow: 0 0 24px var(--champ-a-glow);
}

.empty-orbit span:nth-child(2) {
  right: 5px;
  bottom: 16px;
  background: var(--champ-b);
  box-shadow: 0 0 24px var(--champ-b-glow);
}

.empty-orbit span:nth-child(3) {
  left: 8px;
  bottom: 18px;
  background: var(--ink-faint);
}

.empty-state h3 {
  position: relative;
  z-index: 1;
  margin-bottom: var(--space-2);
  font-size: clamp(24px, 4vw, 38px);
  line-height: 1;
  letter-spacing: -0.055em;
}

.empty-state p {
  position: relative;
  z-index: 1;
  max-width: 620px;
  margin: 0 auto;
  color: var(--ink-dim);
  font-size: 14px;
}

.empty-state .suggestions {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: center;
  gap: var(--space-2);
  flex-wrap: wrap;
  margin-top: var(--space-5);
}

/* ==========================================================================
   Responsive picker
   ========================================================================== */

@media (max-width: 900px) {
  .picker-console {
    grid-template-columns: 1fr;
  }

  .vs-divider {
    width: 100%;
    flex-direction: row;
    justify-content: center;
    padding: var(--space-1) 0;
  }

  .vs-mark::before,
  .vs-mark::after {
    display: none;
  }
}

@media (max-width: 560px) {
  .slot {
    padding: var(--space-4);
    border-radius: var(--radius-lg);
  }

  .combobox input {
    height: 52px;
    font-size: 19px;
  }

  .chip-pair span {
    display: none;
  }
}

/* ==========================================================================
   Verdict Hero
   ========================================================================== */

.verdict-band {
  position: relative;
}

.verdict-hero {
  position: relative;
  isolation: isolate;
  padding: clamp(24px, 4vw, 42px);
  border: 1px solid var(--line);
  border-radius: var(--radius-2xl);
  background:
    linear-gradient(
      180deg,
      oklch(21% 0.030 240 / 0.94),
      oklch(14.5% 0.022 240 / 0.96)
    );
  box-shadow: var(--shadow-elevated);
  overflow: hidden;
}

.verdict-hero::before {
  content: "";
  position: absolute;
  inset: 1px;
  z-index: -1;
  border-radius: calc(var(--radius-2xl) - 1px);
  background:
    linear-gradient(
      135deg,
      oklch(100% 0 0 / 0.08),
      transparent 32%,
      transparent 66%,
      oklch(100% 0 0 / 0.05)
    );
  pointer-events: none;
}

.verdict-bg {
  position: absolute;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  overflow: hidden;
}

.verdict-bg .orb {
  position: absolute;
  width: 460px;
  height: 460px;
  border-radius: 50%;
  filter: blur(42px);
  opacity: .48;
}

.verdict-bg .orb-a {
  left: -150px;
  top: -190px;
  background: var(--champ-a-faint);
}

.verdict-bg .orb-b {
  right: -150px;
  top: -190px;
  background: var(--champ-b-faint);
}

.verdict-bg .grid-glow {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(var(--line-soft) 1px, transparent 1px),
    linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
  background-size: 42px 42px;
  mask-image: radial-gradient(circle at 50% 0%, black, transparent 68%);
  opacity: .28;
}

.verdict-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-5);
  margin-bottom: var(--space-7);
}

.matchup-heading {
  min-width: 0;
}

.eyebrow {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-3);
  color: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .13em;
}

.eyebrow i {
  width: 30px;
  height: 1px;
  background:
    linear-gradient(
      90deg,
      var(--champ-a),
      var(--champ-b)
    );
  opacity: .74;
}

.matchup-title {
  display: flex;
  align-items: baseline;
  gap: clamp(10px, 2vw, 18px);
  flex-wrap: wrap;
  font-size: clamp(40px, 7vw, 86px);
  line-height: .9;
  letter-spacing: -0.08em;
}

.matchup-title .name-a {
  color: var(--champ-a);
  text-shadow: 0 0 34px var(--champ-a-glow);
}

.matchup-title .name-b {
  color: var(--champ-b);
  text-shadow: 0 0 34px var(--champ-b-glow);
}

.matchup-title .vs-x {
  color: var(--ink-muted);
  font-family: var(--font-mono);
  font-size: clamp(16px, 2vw, 22px);
  font-weight: 800;
  letter-spacing: .06em;
  text-transform: uppercase;
}

/* --------------------------------------------------------------------------
   Sample badge
   -------------------------------------------------------------------------- */

.sample-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  min-height: 38px;
  padding: 0 14px;
  border: 1px solid var(--line);
  border-radius: var(--radius-pill);
  color: var(--ink-dim);
  background:
    linear-gradient(
      180deg,
      var(--surface-2),
      var(--surface-1)
    );
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 650;
  white-space: nowrap;
  box-shadow:
    0 1px 0 oklch(100% 0 0 / 0.045) inset,
    0 12px 32px oklch(0% 0 0 / 0.22);
}

.sample-badge .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: currentColor;
  box-shadow: 0 0 18px currentColor;
}

.sample-badge strong {
  color: var(--ink);
  font-weight: 800;
}

.sample-badge.high {
  color: var(--success);
  border-color: var(--success-line);
  background:
    linear-gradient(
      180deg,
      var(--success-soft),
      var(--surface-1)
    );
}

.sample-badge.mid {
  color: var(--warning);
  border-color: var(--warning-line);
  background:
    linear-gradient(
      180deg,
      var(--warning-soft),
      var(--surface-1)
    );
}

.sample-badge.low {
  color: var(--danger);
  border-color: var(--danger-line);
  background:
    linear-gradient(
      180deg,
      var(--danger-soft),
      var(--surface-1)
    );
}

/* --------------------------------------------------------------------------
   Main verdict
   -------------------------------------------------------------------------- */

.verdict-main {
  display: grid;
  grid-template-columns: minmax(0, 1.15fr) minmax(320px, .85fr);
  gap: var(--space-6);
  align-items: stretch;
  margin-bottom: var(--space-7);
}

.verdict-primary {
  padding: clamp(20px, 3vw, 30px);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  background:
    radial-gradient(
      420px 180px at 18% 0%,
      var(--champ-a-faint),
      transparent 72%
    ),
    radial-gradient(
      420px 180px at 82% 0%,
      var(--champ-b-faint),
      transparent 72%
    ),
    linear-gradient(
      180deg,
      oklch(100% 0 0 / 0.045),
      oklch(100% 0 0 / 0.015)
    );
}

.favored-label {
  margin-bottom: var(--space-2);
  color: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 750;
  text-transform: uppercase;
  letter-spacing: .13em;
}

.favored-name {
  margin-bottom: var(--space-4);
  font-size: clamp(42px, 6vw, 76px);
  font-weight: 850;
  line-height: .9;
  letter-spacing: -0.08em;
}

.favored-name.a {
  color: var(--champ-a);
  text-shadow: 0 0 32px var(--champ-a-glow);
}

.favored-name.b {
  color: var(--champ-b);
  text-shadow: 0 0 32px var(--champ-b-glow);
}

.favored-copy {
  max-width: 720px;
  color: var(--ink-soft);
  font-size: 16px;
  line-height: 1.7;
}

.favored-copy strong {
  color: var(--ink);
  font-weight: 800;
}

.verdict-warning {
  display: block;
  margin-top: var(--space-3);
  color: var(--danger);
}

/* --------------------------------------------------------------------------
   Hero metrics
   -------------------------------------------------------------------------- */

.verdict-metrics {
  display: grid;
  gap: var(--space-3);
}

.hero-metric {
  position: relative;
  padding: var(--space-5);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(
      180deg,
      var(--surface-2),
      var(--surface-1)
    );
  overflow: hidden;
  box-shadow:
    0 1px 0 oklch(100% 0 0 / 0.045) inset,
    0 14px 36px oklch(0% 0 0 / 0.20);
}

.hero-metric::before {
  content: "";
  position: absolute;
  inset: 0;
  opacity: .78;
  pointer-events: none;
  background:
    radial-gradient(
      260px 110px at 0% 0%,
      var(--metric-glow, oklch(100% 0 0 / 0.035)),
      transparent 72%
    );
}

.hero-metric.a {
  --metric-glow: var(--champ-a-faint);
  border-color: var(--champ-a-line);
}

.hero-metric.b {
  --metric-glow: var(--champ-b-faint);
  border-color: var(--champ-b-line);
}

.hero-metric.positive {
  --metric-glow: var(--success-soft);
  border-color: var(--success-line);
}

.hero-metric.negative {
  --metric-glow: var(--danger-soft);
  border-color: var(--danger-line);
}

.hero-metric.neutral {
  --metric-glow: oklch(100% 0 0 / 0.035);
}

.hero-metric-label,
.hero-metric-value,
.hero-metric-sub {
  position: relative;
  z-index: 1;
}

.hero-metric-label {
  margin-bottom: var(--space-2);
  color: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 750;
  text-transform: uppercase;
  letter-spacing: .12em;
}

.hero-metric-value {
  color: var(--ink);
  font-size: clamp(26px, 3.6vw, 42px);
  font-weight: 850;
  line-height: 1;
  letter-spacing: -0.065em;
}

.hero-metric.a .hero-metric-value {
  color: var(--champ-a);
}

.hero-metric.b .hero-metric-value {
  color: var(--champ-b);
}

.hero-metric.positive .hero-metric-value {
  color: var(--success);
}

.hero-metric.negative .hero-metric-value {
  color: var(--danger);
}

.hero-metric-sub {
  margin-top: var(--space-2);
  color: var(--ink-faint);
  font-size: 12px;
  line-height: 1.45;
}

/* --------------------------------------------------------------------------
   Winrate rail
   -------------------------------------------------------------------------- */

.winrate-rail {
  margin-bottom: var(--space-7);
}

.winrate-rail-axis {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  margin-bottom: var(--space-2);
  color: var(--ink-muted);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
}

.winrate-rail-axis span:last-child {
  text-align: right;
}

.winrate-rail-axis strong {
  color: var(--ink-faint);
  font-weight: 800;
}

.winrate-rail-track {
  position: relative;
  height: 54px;
  border: 1px solid var(--line);
  border-radius: var(--radius-pill);
  background:
    linear-gradient(
      180deg,
      var(--bg-void),
      var(--surface-0)
    );
  overflow: hidden;
  box-shadow:
    0 1px 0 oklch(100% 0 0 / 0.05) inset,
    0 16px 40px oklch(0% 0 0 / 0.22);
}

.winrate-rail-track .tick50 {
  position: absolute;
  left: 50%;
  top: -1px;
  bottom: -1px;
  width: 1px;
  z-index: 4;
  background: var(--ink-faint);
  opacity: .72;
  box-shadow: 0 0 18px oklch(100% 0 0 / 0.26);
}

.winrate-rail-fill {
  position: absolute;
  top: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  font-size: 18px;
  font-weight: 850;
  letter-spacing: -0.04em;
}

.winrate-rail-fill span {
  position: relative;
  z-index: 1;
  padding: 0 18px;
}

.winrate-rail-fill.a {
  left: 0;
  justify-content: flex-start;
  color: var(--champ-a);
  background:
    linear-gradient(
      90deg,
      var(--champ-a-soft),
      oklch(72% 0.17 222 / 0.46)
    );
}

.winrate-rail-fill.b {
  right: 0;
  justify-content: flex-end;
  color: var(--champ-b);
  background:
    linear-gradient(
      270deg,
      var(--champ-b-soft),
      oklch(72% 0.17 24 / 0.46)
    );
}

/* --------------------------------------------------------------------------
   Expected performance cards
   -------------------------------------------------------------------------- */

.expectation-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--space-4);
}

.expectation-card {
  position: relative;
  padding: var(--space-5);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  background:
    linear-gradient(
      180deg,
      var(--surface-2),
      var(--surface-1)
    );
  overflow: hidden;
}

.expectation-card::before {
  content: "";
  position: absolute;
  inset: 0;
  opacity: .64;
  pointer-events: none;
  background:
    radial-gradient(
      320px 110px at 0% 0%,
      var(--expect-glow),
      transparent 74%
    );
}

.expectation-card.a {
  --expect-glow: var(--champ-a-faint);
}

.expectation-card.b {
  --expect-glow: var(--champ-b-faint);
}

.expectation-card > * {
  position: relative;
  z-index: 1;
}

.expectation-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: var(--space-3);
  margin-bottom: var(--space-4);
}

.expectation-head strong {
  font-size: 20px;
  font-weight: 850;
  letter-spacing: -0.04em;
}

.expectation-card.a .expectation-head strong {
  color: var(--champ-a);
}

.expectation-card.b .expectation-head strong {
  color: var(--champ-b);
}

.expectation-head span {
  color: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
}

.expectation-values {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: var(--space-2);
  margin-bottom: var(--space-3);
}

.expectation-values div {
  padding: var(--space-3);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-md);
  background: oklch(0% 0 0 / 0.12);
}

.expectation-values span {
  display: block;
  margin-bottom: 5px;
  color: var(--ink-faint);
  font-size: 10px;
  font-family: var(--font-mono);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
}

.expectation-values strong {
  color: var(--ink);
  font-size: 18px;
  font-weight: 820;
  letter-spacing: -0.04em;
}

.expectation-values .positive strong {
  color: var(--success);
}

.expectation-values .negative strong {
  color: var(--danger);
}

.expectation-values .neutral strong {
  color: var(--ink);
}

.delta-meter {
  height: 6px;
  margin-bottom: var(--space-3);
  border-radius: var(--radius-pill);
  background: var(--line-soft);
  overflow: hidden;
}

.delta-meter span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: var(--ink-faint);
}

.delta-meter.positive span {
  background: var(--success);
}

.delta-meter.negative span {
  background: var(--danger);
}

.expectation-card p {
  color: var(--ink-dim);
  font-size: 13px;
  line-height: 1.55;
}

/* --------------------------------------------------------------------------
   Compatibility with old verdict classes
   -------------------------------------------------------------------------- */

.winrate-bar {
  position: relative;
  height: 54px;
  border: 1px solid var(--line);
  border-radius: var(--radius-pill);
  background: var(--bg-void);
  overflow: hidden;
}

.verdict-foot,
.verdict-col,
.verdict-sentence {
  display: none;
}

/* ==========================================================================
   Responsive verdict
   ========================================================================== */

@media (max-width: 980px) {
  .verdict-top,
  .verdict-main {
    grid-template-columns: 1fr;
  }

  .verdict-main {
    display: grid;
  }

  .sample-badge {
    align-self: flex-start;
  }
}

@media (max-width: 760px) {
  .verdict-hero {
    padding: var(--space-5);
    border-radius: var(--radius-xl);
  }

  .verdict-top {
    flex-direction: column;
    margin-bottom: var(--space-5);
  }

  .matchup-title {
    font-size: clamp(36px, 13vw, 62px);
  }

  .verdict-main {
    gap: var(--space-4);
  }

  .verdict-primary {
    padding: var(--space-5);
  }

  .expectation-grid,
  .expectation-values {
    grid-template-columns: 1fr;
  }

  .winrate-rail-track {
    height: 48px;
  }
}

/* ==========================================================================
   Tabs
   ========================================================================== */

.tabs {
  position: sticky;
  top: var(--topbar-height);
  z-index: 35;
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: var(--space-6);
  padding: var(--space-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  background:
    linear-gradient(
      180deg,
      oklch(16.5% 0.024 240 / 0.84),
      oklch(12.5% 0.020 240 / 0.84)
    );
  backdrop-filter: var(--blur-glass);
  -webkit-backdrop-filter: var(--blur-glass);
  overflow-x: auto;
  box-shadow:
    0 1px 0 oklch(100% 0 0 / 0.04) inset,
    0 16px 45px oklch(0% 0 0 / 0.24);
}

.tabs::-webkit-scrollbar {
  height: 0;
}

.tab-btn {
  appearance: none;
  position: relative;
  flex: 0 0 auto;
  min-height: 40px;
  padding: 0 15px;
  border: 1px solid transparent;
  border-radius: var(--radius-pill);
  color: var(--ink-faint);
  background: transparent;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 750;
  letter-spacing: .08em;
  text-transform: uppercase;
  transition:
    color var(--duration-fast) var(--ease),
    background var(--duration-fast) var(--ease),
    border-color var(--duration-fast) var(--ease);
}

.tab-btn:hover {
  color: var(--ink-dim);
  background: oklch(100% 0 0 / 0.035);
}

.tab-btn.active {
  color: var(--ink);
  border-color: var(--champ-a-line);
  background:
    linear-gradient(
      180deg,
      var(--champ-a-soft),
      oklch(100% 0 0 / 0.025)
    );
  box-shadow:
    0 0 0 1px var(--champ-a-faint),
    0 0 30px var(--champ-a-faint);
}

.tab-btn:focus-visible {
  outline: 2px solid var(--champ-a);
  outline-offset: 3px;
}

.tab-panel {
  display: none;
  padding: var(--space-7) 0 var(--space-3);
}

.tab-panel.active {
  display: block;
  animation: panelEnter 360ms var(--ease-out);
}

@keyframes panelEnter {
  from {
    opacity: 0;
    transform: translateY(10px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ==========================================================================
   Panel grid / cards
   ========================================================================== */

.panel-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--space-5);
}

.full-span {
  grid-column: 1 / -1;
}

.card {
  position: relative;
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  background:
    linear-gradient(
      180deg,
      var(--surface-2),
      var(--surface-1)
    );
  box-shadow: var(--shadow-card);
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(
      420px 160px at 18% 0%,
      oklch(100% 0 0 / 0.045),
      transparent 72%
    );
  opacity: .72;
}

.card > * {
  position: relative;
  z-index: 1;
}

.card {
  padding: var(--space-5);
}

.card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-4);
  margin-bottom: var(--space-5);
}

.card-head h3 {
  font-size: clamp(18px, 2vw, 24px);
  line-height: 1.05;
  letter-spacing: -0.045em;
}

.card-sub {
  display: block;
  margin-top: 6px;
  color: var(--ink-faint);
  font-size: 12.5px;
  line-height: 1.45;
}

.info-icon {
  flex: none;
  display: inline-grid;
  place-items: center;
  width: 18px;
  height: 18px;
  border: 1px solid var(--line-strong);
  border-radius: 50%;
  color: var(--ink-faint);
  background: oklch(0% 0 0 / 0.16);
  cursor: help;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 800;
  line-height: 1;
  transition:
    color var(--duration-fast) var(--ease),
    border-color var(--duration-fast) var(--ease),
    background var(--duration-fast) var(--ease);
}

.info-icon:hover,
.info-icon:focus-visible {
  color: var(--ink);
  border-color: var(--champ-a-line);
  background: var(--champ-a-faint);
  outline: none;
}

.empty-note {
  padding: var(--space-5);
  border: 1px dashed var(--line);
  border-radius: var(--radius-lg);
  color: var(--ink-faint);
  background: oklch(0% 0 0 / 0.10);
  font-size: 13px;
  line-height: 1.65;
}

.empty-note.full-span {
  grid-column: 1 / -1;
}

/* ==========================================================================
   Generic stat / insight cards
   ========================================================================== */

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: var(--space-3);
}

.stat-card {
  position: relative;
  padding: var(--space-4);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(
      180deg,
      var(--surface-3),
      oklch(18% 0.026 240)
    );
  overflow: hidden;
}

.stat-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(
      220px 90px at 0% 0%,
      oklch(100% 0 0 / 0.05),
      transparent 70%
    );
  pointer-events: none;
}

.stat-card .label {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-2);
  color: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 750;
  line-height: 1.35;
  text-transform: uppercase;
  letter-spacing: .08em;
}

.stat-card .value {
  position: relative;
  z-index: 1;
  color: var(--ink);
  font-size: 28px;
  font-weight: 850;
  line-height: 1;
  letter-spacing: -0.055em;
}

.stat-card .value.a {
  color: var(--champ-a);
}

.stat-card .value.b {
  color: var(--champ-b);
}

.stat-card .sub {
  position: relative;
  z-index: 1;
  margin-top: var(--space-2);
  color: var(--ink-faint);
  font-size: 12px;
  line-height: 1.45;
}

/* ==========================================================================
   Donut shared
   ========================================================================== */

.donut-wrap {
  display: flex;
  align-items: center;
  gap: var(--space-5);
  flex-wrap: wrap;
}

.donut {
  position: relative;
  flex: none;
  width: 148px;
  height: 148px;
  border-radius: 50%;
  box-shadow:
    0 0 0 1px var(--line) inset,
    0 18px 42px oklch(0% 0 0 / 0.28);
}

.donut::after {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  background:
    radial-gradient(
      circle at 50% 18%,
      oklch(100% 0 0 / 0.11),
      transparent 36%
    );
  pointer-events: none;
}

.donut-center {
  position: absolute;
  inset: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background:
    radial-gradient(
      circle at 50% 0%,
      var(--surface-3),
      var(--surface-1)
    );
  box-shadow:
    0 0 0 1px var(--line) inset,
    0 16px 40px oklch(0% 0 0 / 0.34);
}

.donut-center .big {
  color: var(--ink);
  font-size: 28px;
  font-weight: 850;
  line-height: 1;
  letter-spacing: -0.06em;
}

.donut-center .small {
  max-width: 86px;
  margin-top: 4px;
  color: var(--ink-faint);
  font-size: 10px;
  line-height: 1.25;
  text-align: center;
}

.donut-legend {
  display: grid;
  gap: var(--space-2);
  color: var(--ink-dim);
  font-size: 13px;
}

.donut-legend .row {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.donut-legend i {
  flex: none;
  width: 10px;
  height: 10px;
  border-radius: 3px;
}

/* ==========================================================================
   Tooltip
   ========================================================================== */

#tooltip {
  position: fixed;
  z-index: 999;
  max-width: 300px;
  pointer-events: none;
  padding: 10px 12px;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-md);
  color: var(--ink-soft);
  background:
    linear-gradient(
      180deg,
      oklch(24% 0.032 240 / 0.96),
      oklch(17% 0.024 240 / 0.96)
    );
  box-shadow: var(--shadow-elevated);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  font-size: 12px;
  line-height: 1.5;
  opacity: 0;
  transform: translateY(4px) scale(.985);
  transition:
    opacity 120ms var(--ease),
    transform 120ms var(--ease);
}

#tooltip.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}

#tooltip .tt-title {
  margin-bottom: 4px;
  color: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 800;
  letter-spacing: .06em;
  text-transform: uppercase;
}

#tooltip strong {
  color: var(--ink);
}

/* ==========================================================================
   Shared polarity
   ========================================================================== */

.positive {
  color: var(--success);
}

.negative {
  color: var(--danger);
}

.neutral {
  color: var(--ink-dim);
}

.a {
  color: var(--champ-a);
}

.b {
  color: var(--champ-b);
}

/* ==========================================================================
   Responsive shared components
   ========================================================================== */

@media (max-width: 860px) {
  .tabs {
    top: 0;
    border-radius: var(--radius-lg);
  }

  .panel-grid {
    grid-template-columns: 1fr;
  }

  .card {
    border-radius: var(--radius-lg);
    padding: var(--space-4);
  }

  .card-head {
    flex-direction: column;
    gap: var(--space-2);
  }
}

@media (max-width: 560px) {
  .tab-btn {
    min-height: 36px;
    padding: 0 12px;
    font-size: 10px;
  }

  .donut {
    width: 132px;
    height: 132px;
  }

  .donut-center {
    inset: 14px;
  }
}

/* ==========================================================================
   Overview / Champion Identity
   ========================================================================== */

.overview-identity {
  position: relative;
}

.identity-layout {
  display: grid;
  gap: var(--space-5);
}

.identity-main {
  padding: var(--space-6);
}

.identity-rows {
  display: grid;
  gap: var(--space-5);
}

.identity-row {
  padding: var(--space-4);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(
      180deg,
      oklch(100% 0 0 / 0.035),
      oklch(0% 0 0 / 0.08)
    );
}

.identity-row-head {
  display: flex;
  justify-content: space-between;
  gap: var(--space-4);
  margin-bottom: var(--space-3);
}

.identity-row-head strong {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-top: var(--space-2);
  color: var(--ink);
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.025em;
}

.identity-row-head em {
  color: var(--ink-faint);
  font-style: normal;
  font-family: var(--font-mono);
  font-size: 11px;
  text-align: right;
}

.identity-scale {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  margin-bottom: 7px;
  color: var(--ink-muted);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
}

.identity-scale span:nth-child(2),
.identity-scale strong {
  text-align: center;
}

.identity-scale span:nth-child(4),
.identity-scale span:nth-child(5) {
  text-align: right;
}

.identity-scale strong {
  color: var(--ink-faint);
}

.identity-track {
  position: relative;
  height: 12px;
  border-radius: var(--radius-pill);
  background:
    linear-gradient(
      90deg,
      oklch(100% 0 0 / 0.035),
      oklch(100% 0 0 / 0.11),
      oklch(100% 0 0 / 0.035)
    );
  box-shadow: 0 0 0 1px var(--line-soft) inset;
}

.identity-midline {
  position: absolute;
  left: 50%;
  top: -5px;
  bottom: -5px;
  width: 1px;
  background: var(--ink-faint);
  opacity: .55;
}

.identity-marker {
  position: absolute;
  top: 50%;
  width: 18px;
  height: 18px;
  transform: translate(-50%, -50%);
  border: 3px solid var(--surface-1);
  border-radius: 50%;
  box-shadow:
    0 0 0 1px var(--line),
    0 8px 18px oklch(0% 0 0 / 0.28);
  cursor: help;
}

.identity-marker i {
  display: block;
  width: 100%;
  height: 100%;
  border-radius: inherit;
}

.identity-marker.a i {
  background: var(--champ-a);
  box-shadow: 0 0 22px var(--champ-a-glow);
}

.identity-marker.b i {
  background: var(--champ-b);
  box-shadow: 0 0 22px var(--champ-b-glow);
}

.identity-values {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-3);
  margin-top: var(--space-3);
}

.identity-values div {
  padding: var(--space-3);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-md);
  background: oklch(0% 0 0 / 0.11);
}

.identity-values span {
  display: block;
  margin-bottom: 4px;
  color: var(--ink-faint);
  font-size: 11px;
}

.identity-values strong {
  display: block;
  color: var(--ink);
  font-size: 18px;
  font-weight: 850;
  letter-spacing: -0.045em;
}

.identity-values em {
  display: block;
  margin-top: 4px;
  color: var(--ink-faint);
  font-style: normal;
  font-size: 11px;
}

.identity-values .a strong,
.identity-values .a span {
  color: var(--champ-a);
}

.identity-values .b strong,
.identity-values .b span {
  color: var(--champ-b);
}

/* --------------------------------------------------------------------------
   Identity radar
   -------------------------------------------------------------------------- */

.identity-radar-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--space-5);
}

.identity-radar {
  position: relative;
  padding: var(--space-5);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  background:
    linear-gradient(
      180deg,
      var(--surface-2),
      var(--surface-1)
    );
  box-shadow: var(--shadow-card);
  overflow: hidden;
}

.identity-radar::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(
      360px 160px at 50% 0%,
      var(--radar-glow),
      transparent 74%
    );
}

.identity-radar.a {
  --radar-glow: var(--champ-a-faint);
}

.identity-radar.b {
  --radar-glow: var(--champ-b-faint);
}

.identity-radar > * {
  position: relative;
  z-index: 1;
}

.identity-radar-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: var(--space-3);
  margin-bottom: var(--space-4);
}

.identity-radar-head strong {
  font-size: 20px;
  font-weight: 850;
  letter-spacing: -0.045em;
}

.identity-radar.a .identity-radar-head strong {
  color: var(--champ-a);
}

.identity-radar.b .identity-radar-head strong {
  color: var(--champ-b);
}

.identity-radar svg {
  width: min(100%, 320px);
  height: auto;
  display: block;
  margin: 0 auto;
  overflow: visible;
}

.identity-radar text {
  font-family: var(--font-mono);
}

.identity-radar circle {
  cursor: help;
}

/* --------------------------------------------------------------------------
   Identity summary / coverage
   -------------------------------------------------------------------------- */

.identity-summary-grid,
.identity-coverage-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--space-5);
}

.identity-summary {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-3);
  padding: var(--space-4);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  background:
    linear-gradient(
      180deg,
      var(--surface-2),
      var(--surface-1)
    );
  box-shadow: var(--shadow-card);
}

.identity-summary div {
  padding: var(--space-4);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg);
  background: oklch(0% 0 0 / 0.12);
}

.identity-summary strong {
  display: block;
  margin-top: var(--space-2);
  color: var(--ink);
  font-size: 17px;
  font-weight: 850;
  letter-spacing: -0.04em;
}

.identity-summary p {
  margin-top: var(--space-2);
  color: var(--ink-dim);
  font-size: 13px;
}

.identity-coverage-card {
  position: relative;
  padding: var(--space-5);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  background:
    linear-gradient(
      180deg,
      var(--surface-2),
      var(--surface-1)
    );
  box-shadow: var(--shadow-card);
  overflow: hidden;
}

.identity-coverage-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(
      340px 140px at 0% 0%,
      var(--coverage-glow),
      transparent 72%
    );
  pointer-events: none;
}

.identity-coverage-card.a {
  --coverage-glow: var(--champ-a-faint);
}

.identity-coverage-card.b {
  --coverage-glow: var(--champ-b-faint);
}

.identity-coverage-card > * {
  position: relative;
  z-index: 1;
}

.identity-coverage-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
  margin-bottom: var(--space-4);
}

.identity-coverage-top h3 {
  margin-top: var(--space-2);
  font-size: 26px;
  line-height: 1;
}

.identity-coverage-card.a h3 {
  color: var(--champ-a);
}

.identity-coverage-card.b h3 {
  color: var(--champ-b);
}

.coverage-ring {
  display: grid;
  place-items: center;
  width: 94px;
  height: 94px;
  border: 1px solid var(--line);
  border-radius: 50%;
  background:
    radial-gradient(circle, var(--surface-2), var(--surface-1));
  box-shadow:
    0 0 0 8px oklch(100% 0 0 / 0.025),
    0 18px 42px oklch(0% 0 0 / 0.30);
}

.coverage-ring span {
  color: var(--ink);
  font-size: 22px;
  font-weight: 850;
  line-height: 1;
  letter-spacing: -0.055em;
}

.coverage-ring small {
  color: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .08em;
}

.coverage-ring.high {
  border-color: var(--success-line);
  box-shadow:
    0 0 0 8px var(--success-soft),
    0 18px 42px oklch(0% 0 0 / 0.30);
}

.coverage-ring.mid {
  border-color: var(--warning-line);
  box-shadow:
    0 0 0 8px var(--warning-soft),
    0 18px 42px oklch(0% 0 0 / 0.30);
}

.coverage-ring.low {
  border-color: var(--danger-line);
  box-shadow:
    0 0 0 8px var(--danger-soft),
    0 18px 42px oklch(0% 0 0 / 0.30);
}

.coverage-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-3);
}

.coverage-stats div {
  padding: var(--space-3);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-md);
  background: oklch(0% 0 0 / 0.12);
}

.coverage-stats span {
  display: block;
  margin-bottom: 5px;
  color: var(--ink-faint);
  font-size: 10px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: .08em;
}

.coverage-stats strong {
  color: var(--ink);
  font-size: 17px;
  font-weight: 850;
  letter-spacing: -0.04em;
}

/* ==========================================================================
   Trajectory / Game Flow
   ========================================================================== */

.trajectory-section {
  position: relative;
}

.trajectory-card {
  padding: var(--space-6);
}

.trajectory-head {
  align-items: flex-start;
}

.trajectory-note {
  margin-bottom: var(--space-5);
  padding: var(--space-4);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg);
  color: var(--ink-dim);
  background: oklch(0% 0 0 / 0.11);
  font-size: 13px;
  line-height: 1.65;
}

.trajectory-summary {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: var(--space-3);
  margin-bottom: var(--space-5);
}

.trajectory-summary-card {
  position: relative;
  padding: var(--space-4);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(
      180deg,
      var(--surface-3),
      oklch(18% 0.026 240)
    );
  overflow: hidden;
}

.trajectory-summary-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(
      230px 90px at 0% 0%,
      var(--summary-glow, oklch(100% 0 0 / 0.04)),
      transparent 72%
    );
  pointer-events: none;
}

.trajectory-summary-card.a {
  --summary-glow: var(--champ-a-faint);
  border-color: var(--champ-a-line);
}

.trajectory-summary-card.b {
  --summary-glow: var(--champ-b-faint);
  border-color: var(--champ-b-line);
}

.trajectory-summary-card > * {
  position: relative;
  z-index: 1;
}

.trajectory-summary-card strong {
  display: block;
  margin-top: var(--space-2);
  color: var(--ink);
  font-size: 24px;
  font-weight: 850;
  line-height: 1;
  letter-spacing: -0.055em;
}

.trajectory-summary-card.a strong {
  color: var(--champ-a);
}

.trajectory-summary-card.b strong {
  color: var(--champ-b);
}

.trajectory-summary-card p {
  margin-top: var(--space-2);
  color: var(--ink-faint);
  font-size: 12px;
  line-height: 1.45;
}

/* --------------------------------------------------------------------------
   River controls
   -------------------------------------------------------------------------- */

.river-controls {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
}

.river-btn {
  appearance: none;
  min-height: 36px;
  padding: 0 13px;
  border: 1px solid var(--line);
  border-radius: var(--radius-pill);
  color: var(--ink-faint);
  background:
    linear-gradient(
      180deg,
      var(--surface-2),
      var(--surface-1)
    );
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 750;
  letter-spacing: .075em;
  text-transform: uppercase;
  transition:
    color var(--duration-fast) var(--ease),
    border-color var(--duration-fast) var(--ease),
    background var(--duration-fast) var(--ease);
}

.river-btn:hover {
  color: var(--ink);
  border-color: var(--line-strong);
}

.river-btn.active {
  color: var(--ink);
  border-color: var(--champ-a-line);
  background:
    linear-gradient(
      180deg,
      var(--champ-a-soft),
      oklch(100% 0 0 / 0.025)
    );
  box-shadow: 0 0 28px var(--champ-a-faint);
}

/* --------------------------------------------------------------------------
   River SVG
   -------------------------------------------------------------------------- */

.river-svg-wrap {
  position: relative;
  margin-top: var(--space-4);
}

.river-svg-wrap svg {
  display: block;
  width: 100%;
  height: auto;
  overflow: visible;
}

.river-chart {
  border-radius: var(--radius-xl);
}

.river-plot-bg {
  fill: oklch(0% 0 0 / 0.12);
  stroke: var(--line-soft);
  stroke-width: 1;
}

.river-grid-line,
.river-time-line {
  stroke: var(--line-soft);
  stroke-width: 1;
}

.river-time-line {
  opacity: .38;
}

.river-axis-label {
  fill: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 650;
}

.river-zero-line {
  stroke: var(--ink-faint);
  stroke-width: 1.3;
  stroke-dasharray: 4 5;
  opacity: .78;
}

.river-area {
  transition: opacity var(--duration-normal) var(--ease);
}

.river-glow-trace {
  fill: none;
  stroke: oklch(96% 0.012 230 / 0.18);
  stroke-width: 8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.river-trace {
  fill: none;
  stroke: var(--ink);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.river-marker {
  cursor: help;
}

.river-marker line {
  stroke: var(--line-strong);
  stroke-width: 1;
  stroke-dasharray: 4 4;
}

.river-marker circle {
  fill: var(--ink);
  stroke: var(--surface-1);
  stroke-width: 3;
}

.river-marker.a circle {
  fill: var(--champ-a);
}

.river-marker.b circle {
  fill: var(--champ-b);
}

.river-marker text {
  fill: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
}

.riv-hover-line {
  stroke: var(--ink-dim);
  stroke-width: 1;
  stroke-dasharray: 3 4;
}

.riv-hover-dot {
  fill: var(--ink);
  stroke: var(--surface-1);
  stroke-width: 3;
}

.riv-hover-label {
  fill: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 800;
}

.river-legend {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  flex-wrap: wrap;
  margin-top: var(--space-3);
  color: var(--ink-faint);
  font-size: 12px;
}

.river-legend span {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
}

.river-legend i {
  width: 20px;
  height: 4px;
  border-radius: var(--radius-pill);
}

.river-legend em {
  color: var(--ink-muted);
  font-style: normal;
}

/* --------------------------------------------------------------------------
   Level 6
   -------------------------------------------------------------------------- */

.level6-card {
  margin-top: var(--space-5);
}

.level6-story {
  padding: var(--space-5);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-xl);
  background: oklch(0% 0 0 / 0.10);
}

.level6-axis {
  position: relative;
  height: 90px;
  margin: var(--space-3) 0 var(--space-4);
}

.level6-line {
  position: absolute;
  left: 0;
  right: 0;
  top: 46px;
  height: 1px;
  background:
    linear-gradient(
      90deg,
      var(--line-soft),
      var(--line-strong),
      var(--line-soft)
    );
}

.level6-marker {
  position: absolute;
  top: 29px;
  transform: translateX(-50%);
  display: grid;
  justify-items: center;
  gap: 4px;
  min-width: 100px;
}

.level6-marker .dot {
  width: 14px;
  height: 14px;
  border: 3px solid var(--surface-1);
  border-radius: 50%;
  box-shadow:
    0 0 0 1px var(--line),
    0 8px 20px oklch(0% 0 0 / 0.25);
}

.level6-marker.a .dot {
  background: var(--champ-a);
  box-shadow:
    0 0 0 1px var(--line),
    0 0 24px var(--champ-a-glow);
}

.level6-marker.b .dot {
  background: var(--champ-b);
  box-shadow:
    0 0 0 1px var(--line),
    0 0 24px var(--champ-b-glow);
}

.level6-marker strong {
  color: var(--ink);
  font-size: 12px;
  font-weight: 800;
}

.level6-marker.a strong,
.level6-marker.a em {
  color: var(--champ-a);
}

.level6-marker.b strong,
.level6-marker.b em {
  color: var(--champ-b);
}

.level6-marker em {
  color: var(--ink-faint);
  font-style: normal;
  font-family: var(--font-mono);
  font-size: 11px;
}

.level6-caption {
  color: var(--ink-dim);
  font-size: 14px;
  line-height: 1.6;
}

.level6-caption strong {
  color: var(--ink);
}

/* ==========================================================================
   Responsive overview / trajectory
   ========================================================================== */

@media (max-width: 980px) {
  .identity-radar-grid,
  .identity-summary-grid,
  .identity-coverage-grid,
  .trajectory-summary {
    grid-template-columns: 1fr;
  }

  .coverage-stats {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 660px) {
  .identity-main,
  .trajectory-card {
    padding: var(--space-4);
  }

  .identity-row-head,
  .identity-values,
  .identity-summary {
    grid-template-columns: 1fr;
  }

  .identity-row-head {
    flex-direction: column;
  }

  .identity-row-head em {
    text-align: left;
  }

  .level6-marker {
    min-width: 78px;
  }

  .level6-marker strong {
    max-width: 84px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
}

/* ==========================================================================
   Combat + Economy + Objectives + Raw + Glossary + Footer + Final Responsive
   ========================================================================== */

/* ==========================================================================
   Compare bars shared
   ========================================================================== */

.compare-bar {
  display: grid;
  gap: var(--space-2);
  margin-top: var(--space-4);
}

.compare-bar + .compare-bar {
  margin-top: var(--space-5);
}

.compare-bar-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
  color: var(--ink-dim);
  font-size: 13px;
}

.compare-bar-label strong {
  color: var(--ink);
  font-size: 13px;
  font-weight: 800;
}

.compare-bar-label em {
  color: var(--ink-faint);
  font-style: normal;
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-align: right;
}

.compare-bar-label em.a {
  color: var(--champ-a);
}

.compare-bar-label em.b {
  color: var(--champ-b);
}

.compare-bar-row {
  display: grid;
  grid-template-columns: 112px minmax(0, 1fr) 82px;
  align-items: center;
  gap: var(--space-3);
}

.compare-name {
  min-width: 0;
  color: var(--ink-faint);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  text-align: right;
}

.compare-name span {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.compare-bar-row.a .compare-name {
  color: var(--champ-a);
}

.compare-bar-row.b .compare-name {
  color: var(--champ-b);
}

.compare-track {
  position: relative;
  height: 16px;
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-pill);
  background: oklch(0% 0 0 / 0.15);
  overflow: hidden;
}

.compare-fill {
  height: 100%;
  min-width: 2px;
  border-radius: inherit;
  transition: width 560ms var(--ease-emphatic);
}

.compare-fill.a {
  background:
    linear-gradient(
      90deg,
      var(--champ-a-soft),
      var(--champ-a)
    );
  box-shadow: 0 0 20px var(--champ-a-glow);
}

.compare-fill.b {
  background:
    linear-gradient(
      90deg,
      var(--champ-b-soft),
      var(--champ-b)
    );
  box-shadow: 0 0 20px var(--champ-b-glow);
}

.compare-value {
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 750;
  text-align: right;
}

.compare-bar-row.is-leader .compare-value {
  color: var(--ink);
}

/* ==========================================================================
   Combat
   ========================================================================== */

.combat-section {
  position: relative;
}

.combat-grid {
  align-items: stretch;
}

.combat-card {
  min-height: 100%;
}

.combat-insight-strip,
.economy-insight-strip {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--space-3);
  margin-bottom: var(--space-5);
}

.combat-insight-strip.single,
.economy-insight-strip.single {
  grid-template-columns: 1fr;
}

.combat-insight-card,
.economy-insight {
  position: relative;
  padding: var(--space-4);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg);
  background:
    linear-gradient(
      180deg,
      var(--surface-3),
      oklch(18% 0.026 240)
    );
  overflow: hidden;
}

.combat-insight-card::before,
.economy-insight::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(
      260px 110px at 0% 0%,
      var(--insight-glow, oklch(100% 0 0 / 0.04)),
      transparent 72%
    );
}

.combat-insight-card.a,
.economy-insight.a {
  --insight-glow: var(--champ-a-faint);
  border-color: var(--champ-a-line);
}

.combat-insight-card.b,
.economy-insight.b {
  --insight-glow: var(--champ-b-faint);
  border-color: var(--champ-b-line);
}

.combat-insight-card.positive,
.economy-insight.positive {
  --insight-glow: var(--success-soft);
  border-color: var(--success-line);
}

.combat-insight-card.negative,
.economy-insight.negative {
  --insight-glow: var(--danger-soft);
  border-color: var(--danger-line);
}

.combat-insight-card > *,
.economy-insight > * {
  position: relative;
  z-index: 1;
}

.combat-insight-card strong,
.economy-insight strong {
  display: block;
  margin-top: var(--space-2);
  color: var(--ink);
  font-size: 24px;
  font-weight: 850;
  line-height: 1;
  letter-spacing: -0.055em;
}

.combat-insight-card.a strong,
.economy-insight.a strong {
  color: var(--champ-a);
}

.combat-insight-card.b strong,
.economy-insight.b strong {
  color: var(--champ-b);
}

.combat-insight-card.positive strong,
.economy-insight.positive strong {
  color: var(--success);
}

.combat-insight-card.negative strong,
.economy-insight.negative strong {
  color: var(--danger);
}

.combat-insight-card p,
.economy-insight p {
  margin-top: var(--space-2);
  color: var(--ink-faint);
  font-size: 12px;
  line-height: 1.45;
}

/* Damage stack */

.damage-stack-list {
  display: grid;
  gap: var(--space-4);
}

.stack-row {
  display: grid;
  gap: var(--space-2);
}

.stack-row-head {
